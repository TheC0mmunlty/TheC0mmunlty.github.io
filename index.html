<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Robloxians</title>
    <style>
        /* BASE STYLES */
        * { font-family: "MS Sans Serif", Geneva, sans-serif; -webkit-font-smoothing: none; box-sizing: border-box; }
        body { margin: 0; background: #ccc url('https://wallpapercave.com/wp/wp9084955.jpg') fixed center; background-size: cover; }
        
        /* ORANGE GLOBAL BANNER (Fixed per request) */
        #announcement-banner { 
            background: #ff9800; 
            color: #ffffff; 
            padding: 10px; 
            text-align: center; 
            font-weight: bold; 
            font-size: 14px; 
            width: 100%; 
            display: none;
            border-bottom: 3px solid #e68a00;
            z-index: 1000;
        }

        header { background: #0055ff; color: white; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid #0033aa; }
        .header-meta { font-size: 10px; font-weight: bold; text-transform: uppercase; color: #ffd700; }
        
        /* NOTIFICATION PING (Discord Red Dot) */
        .ping-container { position: relative; display: inline-block; }
        .ping-dot { position: absolute; top: -3px; right: -3px; width: 12px; height: 12px; background: #ff4444; border: 2px solid white; border-radius: 50%; display: none; }

        .main-wrapper { width: 1000px; margin: 10px auto; background: rgba(238, 238, 238, 0.98); border: 1px solid #888; min-height: 700px; padding: 20px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .hidden { display: none !important; }
        
        /* BUTTONS */
        .btn { background: #e1e1e1; border: 1px solid #777; padding: 4px 12px; cursor: pointer; font-size: 12px; font-weight: bold; box-shadow: inset 1px 1px #fff, inset -1px -1px #999; }
        .btn-red { background: #ff4444; color: white; border: 1px solid #aa0000; }
        .btn-yellow { background: #ffcc00; color: black; border: 1px solid #ccaa00; }

        /* DOMINO CROWN (Three-piece rework) */
        .hat-domino { position: absolute; top: -16px; left: -6px; width: 34px; height: 20px; display: flex; gap: 2px; align-items: flex-end; }
        .domino-piece { width: 10px; background: #000; border: 1px solid #fff; position: relative; }
        .piece-1 { height: 14px; } .piece-2 { height: 20px; } .piece-3 { height: 14px; }
        .domino-piece::after { content: '..'; color: white; font-size: 7px; position: absolute; top: 1px; left: 1px; line-height: 5px; }

        /* AVATAR RENDER */
        .avatar-frame { width: 80px; height: 110px; position: relative; background: #eee; border: 1px solid #999; display: flex; flex-direction: column; align-items: center; margin: 10px; }
        .char-head { width: 22px; height: 22px; border: 1px solid rgba(0,0,0,0.2); z-index: 5; position: relative; margin-top: 10px; }
        .char-torso { width: 44px; height: 44px; border: 1px solid rgba(0,0,0,0.2); position: relative; }
        .char-arm { width: 16px; height: 42px; border: 1px solid rgba(0,0,0,0.2); position: absolute; top: 0; }
        .arm-l { left: -17px; } .arm-r { right: -17px; }
        .char-leg-set { display: flex; }
        .char-leg { width: 20px; height: 44px; border: 1px solid rgba(0,0,0,0.2); }

        /* FORUM ROWS */
        .row { border-bottom: 1px solid #ddd; padding: 15px; background: #fff; display: flex; align-items: center; position: relative; }
        .deleted-post { opacity: 0.3; background: #ffdada !important; border: 1px dashed red; }
    </style>
</head>
<body>

<div id="announcement-banner"></div>

<header>
    <div>
        <div style="font-weight:bold; font-size: 18px;">The Robloxians</div>
        <div id="rank-indicator" class="header-meta">GUEST</div>
    </div>
    <div id="user-display">User: Guest</div>
</header>

<div class="main-wrapper">
    <div id="auth-view" style="text-align:center; padding:50px;">
        <h2>The Robloxians Login</h2>
        <input type="text" id="reg-user" placeholder="Username" style="display:block; margin:10px auto; padding:8px; width:250px;">
        <input type="email" id="auth-email" placeholder="Email" style="display:block; margin:10px auto; padding:8px; width:250px;">
        <input type="password" id="auth-pass" placeholder="Password" style="display:block; margin:10px auto; padding:8px; width:250px;">
        <button class="btn btn-yellow" id="loginBtn">Login</button>
        <button class="btn" id="signupBtn">Sign Up</button>
    </div>

    <div id="logged-in-view" class="hidden">
        <div style="display: flex; justify-content: space-between; margin-bottom: 20px; border-bottom: 2px solid #ccc; padding-bottom: 10px;">
            <div style="font-weight:bold;">Level: <span id="lvl">1</span></div>
            <div>
                <button class="btn" onclick="showView('forum-home')">Forum</button>
                <div class="ping-container">
                    <button class="btn" onclick="showView('inbox-view')">Inbox</button>
                    <div id="ping-dot" class="ping-dot"></div>
                </div>
                <button class="btn" id="myProfileBtn">My Profile</button>
                <button class="btn btn-red hidden" id="adminBtn" onclick="showView('admin-view')">ADMIN PANEL</button>
                <button class="btn" id="logoutBtn">Logout</button>
            </div>
        </div>

        <div id="forum-home">
            <textarea id="post-input" placeholder="Say something..." style="width:100%; height: 60px;"></textarea>
            <button class="btn btn-yellow" id="submitPost" style="width:100%; margin-top:5px;">Post</button>
            <div id="thread-display" style="margin-top: 20px;"></div>
        </div>

        <div id="admin-view" class="hidden">
            <div style="border: 2px solid #aa0000; padding: 20px; background: #fff;">
                <h2 style="color:#aa0000; margin-top:0;">Staff Control Console</h2>
                <input type="text" id="target-uid" placeholder="Target User UID" style="width: 50%;">
                
                <div id="admin-ranking-tools" class="hidden">
                    <button class="btn btn-red" onclick="setRank(2)">Make Admin</button>
                    <button class="btn btn-yellow" onclick="setRank(1)">Make Moderator</button>
                    <button class="btn" onclick="setRank(0)">Reset Rank</button>
                    <hr>
                    <h3>Global Banner (Admin Only)</h3>
                    <input type="text" id="banner-input" style="width:70%;">
                    <button class="btn btn-yellow" onclick="updateBanner()">Set Banner</button>
                    <button class="btn" onclick="updateBanner('')">Clear</button>
                </div>

                <div id="mod-tools">
                    <hr>
                    <h3>Staff Tools</h3>
                    <input type="text" id="ban-reason" placeholder="Ban Reason">
                    <button class="btn btn-red" onclick="executeBan()">BAN USER</button>
                </div>
            </div>
        </div>

        <div id="profile-view" class="hidden">
            <div style="display:flex; background:white; padding:20px; border:1px solid #ccc; gap:30px;">
                <div id="profile-render"></div>
                <div style="flex-grow: 1;">
                    <h2><span id="v-name"></span> <span id="v-id" style="color:#888; font-size:12px;"></span></h2>
                    <p id="v-bio" style="border:1px solid #ddd; padding:10px;">User bio here...</p>
                    <button class="btn btn-yellow" id="msgBtn">Send Message</button>
                    
                    <div id="my-settings" class="hidden">
                        <hr>
                        <strong>Customizer</strong><br>
                        Head: <input type="color" id="c-head"> Torso: <input type="color" id="c-torso"> Legs: <input type="color" id="c-leg"><br>
                        Hat: <select id="h-select"><option value="none">None</option><option value="domino">Domino Crown</option></select><br>
                        Discord Pings: <input type="checkbox" id="notif-on" checked><br>
                        <button class="btn btn-yellow" id="saveProfile" style="margin-top:10px; width:100%;">Save Profile</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="inbox-view" class="hidden">
            <h3>Inbox</h3>
            <div id="msg-list"></div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, set, push, onValue, get, child, update, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const cfg = { apiKey: "AIzaSyANfmR8j_Z7mHmSO1GNXGnIGKTdBiU6uiU", authDomain: "testingforum-669a9.firebaseapp.com", databaseURL: "https://testingforum-669a9-default-rtdb.firebaseio.com", projectId: "testingforum-669a9", storageBucket: "testingforum-669a9.firebasestorage.app", messagingSenderId: "685025117821", appId: "1:685025117821:web:c3340c8d5475e33eded314" };
    const app = initializeApp(cfg); const auth = getAuth(app); const db = getDatabase(app);
    
    // IMPORTANT: SET YOUR UID HERE TO PREVENT MODERATORS FROM DELETING YOUR POSTS
    const OWNER_UID = "YOUR_UID_HERE"; 
    let me = null;

    function draw(colors, hat) {
        let hatHtml = (hat === 'domino') ? `<div class="hat-domino"><div class="domino-piece piece-1"></div><div class="domino-piece piece-2"></div><div class="domino-piece piece-3"></div></div>` : '';
        const c = colors || {h:'#f5cd30', t:'#0d5f97', l:'#a06110'};
        return `<div class="avatar-frame"><div class="char-head" style="background:${c.h}">${hatHtml}</div><div class="char-torso" style="background:${c.t}"><div class="char-arm arm-l" style="background:${c.h}"></div><div class="char-arm arm-r" style="background:${c.h}"></div></div><div class="char-leg-set"><div class="char-leg" style="background:${c.l}"></div><div class="char-leg" style="background:${c.l}"></div></div></div>`;
    }

    onAuthStateChanged(auth, (u) => {
        if (u) {
            onValue(ref(db, `users/${u.uid}`), (s) => {
                me = s.val(); if(!me) return;
                document.getElementById('user-display').innerText = "Logged in as: " + me.username;
                const ind = document.getElementById('rank-indicator');
                
                // RANK UI LOGIC
                document.getElementById('adminBtn').classList.toggle('hidden', me.rank < 1);
                document.getElementById('admin-ranking-tools').classList.toggle('hidden', me.rank < 2);
                
                if(me.rank === 2) { ind.innerText = "ADMIN"; ind.style.color = "#ff4444"; }
                else if(me.rank === 1) { ind.innerText = "MODERATOR"; ind.style.color = "#ffff00"; }
                else { ind.innerText = "MEMBER"; ind.style.color = "#ffd700"; }
                
                // NOTIFICATION LOGIC
                onValue(ref(db, `msgs/${u.uid}`), (ms) => {
                    let hasUnread = false;
                    ms.forEach(m => { if(!m.val().read) hasUnread = true; });
                    document.getElementById('ping-dot').style.display = (hasUnread && me.pings !== false) ? 'block' : 'none';
                });
            });
            
            // GLOBAL BANNER LISTENER
            onValue(ref(db, 'settings/banner'), (s) => {
                const b = document.getElementById('announcement-banner');
                if(s.val()) { b.innerText = s.val(); b.style.display = 'block'; } 
                else { b.style.display = 'none'; }
            });

            renderForum();
            document.getElementById('auth-view').classList.add('hidden');
            document.getElementById('logged-in-view').classList.remove('hidden');
        }
    });

    // STAFF FUNCTIONS
    window.setRank = (r) => { if(me.rank < 2) return; update(ref(db, `users/${document.getElementById('target-uid').value}`), {rank: r}); };
    window.executeBan = () => { if(me.rank < 1) return; update(ref(db, `users/${document.getElementById('target-uid').value}`), {isBanned: true, banReason: document.getElementById('ban-reason').value}); };
    window.updateBanner = (t) => { if(me.rank < 2) return; update(ref(db, 'settings'), {banner: t !== undefined ? t : document.getElementById('banner-input').value}); };
    
    window.deletePost = (id, authorUid) => {
        if(me.rank >= 1) {
            if(me.rank === 1 && authorUid === OWNER_UID) { alert("Moderators cannot delete the Owner's posts!"); return; }
            update(ref(db, `threads/${id}`), {deleted: true});
        }
    };

    const renderForum = () => {
        onValue(ref(db, 'threads'), async (s) => {
            const display = document.getElementById('thread-display'); display.innerHTML = "";
            const users = (await get(child(ref(db), 'users'))).val() || {};
            s.forEach(c => {
                const p = c.val();
                if(p.deleted && me.rank === 0) return;
                const author = users[p.uid] || {username: "Unknown", num: 0};
                const div = document.createElement('div');
                div.className = 'row' + (p.deleted ? ' deleted-post' : '');
                div.innerHTML = `<div style="transform:scale(0.6); width:50px;">${draw(author.colors, author.hat)}</div>
                    <div style="margin-left:20px; flex-grow:1;">
                        <strong onclick="window.loadProfile('${p.uid}')" style="color:#0055ff; cursor:pointer;">${author.username}</strong> <small>#${author.num}</small>
                        <div style="font-size:13px; margin-top:5px;">${p.msg}</div>
                    </div>
                    ${me.rank >= 1 ? `<button class="btn btn-red" onclick="deletePost('${c.key}', '${p.uid}')">DELETE</button>` : ''}`;
                display.prepend(div);
            });
        });
    };

    window.showView = (id) => { 
        ['forum-home', 'profile-view', 'admin-view', 'inbox-view'].forEach(v => document.getElementById(v).classList.add('hidden')); 
        document.getElementById(id).classList.remove('hidden'); 
    };

    window.loadProfile = async (uid) => {
        showView('profile-view');
        const d = (await get(child(ref(db), `users/${uid}`))).val();
        document.getElementById('v-name').innerText = d.username;
        document.getElementById('v-id').innerText = "#" + (d.num || '0');
        document.getElementById('profile-render').innerHTML = draw(d.colors, d.hat);
        document.getElementById('my-settings').classList.toggle('hidden', uid !== auth.currentUser.uid);
        document.getElementById('msgBtn').onclick = () => {
            const m = prompt("Message to " + d.username + ":");
            if(m) push(ref(db, `msgs/${uid}`), {from: me.username, text: m, read: false, time: Date.now()});
        };
    };

    document.getElementById('saveProfile').onclick = () => {
        update(ref(db, `users/${auth.currentUser.uid}`), {
            hat: document.getElementById('h-select').value,
            colors: { h: document.getElementById('c-head').value, t: document.getElementById('c-torso').value, l: document.getElementById('c-leg').value },
            pings: document.getElementById('notif-on').checked
        }).then(() => alert("Profile Saved!"));
    };

    document.getElementById('signupBtn').onclick = async () => {
        const u = document.getElementById('reg-user').value;
        if(!u) return alert("Enter a username");
        const countSnap = await get(ref(db, 'stats/uCount'));
        const newNum = (countSnap.val() || 0) + 1;
        
        createUserWithEmailAndPassword(auth, document.getElementById('auth-email').value, document.getElementById('auth-pass').value).then(r => {
            set(ref(db, `users/${r.user.uid}`), { 
                username: u, rank: 0, num: newNum, 
                colors: {h:'#f5cd30', t:'#0d5f97', l:'#a06110'}, 
                pings: true, hat: 'none' 
            });
            update(ref(db, 'stats'), { uCount: increment(1) });
        }).catch(e => alert(e.message));
    };

    document.getElementById('loginBtn').onclick = () => signInWithEmailAndPassword(auth, document.getElementById('auth-email').value, document.getElementById('auth-pass').value).catch(e => alert(e.message));
    document.getElementById('submitPost').onclick = () => { 
        const msg = document.getElementById('post-input').value;
        if(msg.trim()) {
            push(ref(db, 'threads'), {msg: msg, uid: auth.currentUser.uid, time: Date.now()}); 
            document.getElementById('post-input').value = ""; 
        }
    };
    document.getElementById('myProfileBtn').onclick = () => window.loadProfile(auth.currentUser.uid);
    document.getElementById('logoutBtn').onclick = () => signOut(auth).then(()=>location.reload());
</script>
</body>
</html>
