<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Robloxians Forum</title>
    <style>
        body { 
            font-family: Verdana, sans-serif; margin: 0; background-color: #000; 
            background-image: url('https://wallpapercave.com/wp/wp9084955.jpg'); 
            background-attachment: fixed; background-size: cover; background-position: center; 
        }
        header { background: #000; color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #555; }
        .main-wrapper { width: 900px; margin: 30px auto; background: #fff; border: 1px solid #888; min-height: 800px; box-shadow: 0px 0px 20px rgba(0,0,0,0.5); position: relative; }
        
        /* CLASSIC ANNOUNCEMENT STYLE */
        #announcement-container { background: #ffffcc; border-bottom: 1px solid #e6db55; padding: 5px; overflow: hidden; display: none; }
        .announcement-text { font-size: 12px; color: #333; font-weight: bold; }

        /* Login Screen Art */
        #logged-out-view {
            background-image: url('https://cdn.discordapp.com/attachments/1395984013587386390/1497797311466569758/login_sign_up.png?ex=69eed3f2&is=69ed8272&hm=5763e511b207221de6dde3aa5ec39e6d79a9fc946c7e120fd94a3119fa121bc5'); 
            background-size: cover; background-position: center; min-height: 800px; display: flex; align-items: center; justify-content: center;
        }

        .auth-card { width: 380px; border: 4px solid #0055ff; background: rgba(255, 255, 255, 0.95); padding: 25px; text-align: center; border-radius: 15px; }
        input, select, textarea { width: 90%; padding: 8px; margin: 6px 0; border: 1px solid #999; font-size: 13px; border-radius: 4px; }
        .forum-header { background: #ccc; padding: 8px; font-weight: bold; margin-top: 15px; font-size: 13px; border: 1px solid #999; }
        .thread-row { border-bottom: 1px solid #eee; padding: 12px; display: flex; justify-content: space-between; font-size: 12px; background: #fff; align-items: center; }
        .clickable-name { color: #0055ff; cursor: pointer; text-decoration: underline; font-weight: bold; }
        .owner-name { color: #FF0000 !important; font-weight: bold; }
        
        .btn { background: #e1e1e1; border: 1px solid #777; padding: 6px 14px; cursor: pointer; font-size: 12px; border-radius: 4px; }
        .btn-admin { background: #ffcc00; font-weight: bold; }
        .btn-danger { background: #ff4444; color: white; }
        
        .hidden { display: none !important; }
        
        /* Ban Screen */
        #ban-view { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #4a0000 0%, #000000 100%); color: #fff; z-index: 99999; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .ban-box { border: 2px solid #ff0000; padding: 40px; background: rgba(0,0,0,0.8); border-radius: 10px; }

        /* Profile & Bio */
        #profile-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; z-index: 100; justify-content: center; align-items: center; }
        .profile-card { background: white; padding: 20px; border: 2px solid #555; width: 350px; text-align: center; border-radius: 8px; }
        .bio-box { background: #f9f9f9; border: 1px inset #ccc; padding: 10px; margin: 10px 0; font-size: 12px; min-height: 40px; color: #444; text-align: left; }
    </style>
</head>
<body>

<div id="ban-view" class="hidden">
    <div class="ban-box">
        <h1 style="font-family: Impact; font-size: 70px; color: #ff0000; margin: 0;">BANNED</h1>
        <p id="ban-reason-text" style="font-size: 24px; color: #fff; font-weight: bold; margin: 20px 0;"></p>
    </div>
</div>

<header>
    <div style="font-weight:bold; font-size: 18px;">THE ROBLOXIANS FORUM</div>
    <div id="user-display" style="font-size: 11px; color: #ccc;">Guest</div>
</header>

<div class="main-wrapper">
    <div id="announcement-container">
        <marquee class="announcement-text" id="announcement-display"></marquee>
    </div>

    <div id="logged-out-view" class="hidden">
        <div class="auth-card">
            <h2>The Robloxians</h2>
            <input type="text" id="reg-username" placeholder="Username">
            <input type="email" id="auth-email" placeholder="Email">
            <input type="password" id="auth-password" placeholder="Password">
            <select id="reg-gender"><option value="Boy">Boy</option><option value="Girl">Girl</option></select>
            <div style="margin-top:15px;"><button class="btn" id="loginBtn">Login</button> <button class="btn btn-admin" id="signupBtn">Sign Up</button></div>
        </div>
    </div>

    <div id="logged-in-view" class="hidden">
        <div style="background: #e1e1e1; padding: 8px; border-bottom: 1px solid #ccc; display: flex; justify-content: space-between;">
            <span id="welcome-text" style="font-size: 11px; font-weight: bold;">Loading...</span>
            <div>
                <button class="btn btn-admin hidden" id="adminBtn">Admin Panel</button>
                <button class="btn btn-danger" id="logoutBtn">Logout</button>
            </div>
        </div>

        <div id="admin-panel" class="hidden" style="border: 2px dashed orange; padding: 15px; margin: 15px; background: #fffdf0;">
            <strong>Staff Controls</strong><br>
            <input type="text" id="target-uid" placeholder="Target UID">
            <input type="text" id="announce-text" placeholder="Announcement Message" style="width: 80%;">
            <div style="margin-top: 10px;">
                <button class="btn btn-admin" id="postAnnounce">Post Announcement</button>
                <button class="btn btn-danger" id="clearAnnounce">Clear</button> |
                <button class="btn btn-danger" id="applyBan">Ban</button>
                <button class="btn btn-admin" id="applyAdmin">Admin</button>
                <button class="btn" id="applyUnrank">Unrank</button>
            </div>
        </div>

        <div style="padding: 15px;">
            <div class="forum-header">Forum Feed</div>
            <textarea id="post-input" placeholder="Say something..."></textarea>
            <button class="btn btn-admin" id="submitPost" style="margin-top:8px;">Post</button>
            <div id="thread-display"></div>
        </div>
    </div>
</div>

<div id="profile-overlay">
    <div class="profile-card">
        <h2 id="p-name">Profile</h2>
        <p id="p-id" style="color: #d00; font-weight: bold; font-size: 11px;"></p>
        <div id="p-bio" class="bio-box"></div>
        <button id="edit-bio-btn" class="btn hidden">Edit Bio</button>
        <hr>
        <button class="btn" onclick="document.getElementById('profile-overlay').style.display='none'">Close</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, set, push, onValue, get, child, remove, update, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyANfmR8j_Z7mHmSO1GNXGnIGKTdBiU6uiU",
        authDomain: "testingforum-669a9.firebaseapp.com",
        databaseURL: "https://testingforum-669a9-default-rtdb.firebaseio.com",
        projectId: "testingforum-669a9",
        storageBucket: "testingforum-669a9.firebasestorage.app",
        messagingSenderId: "685025117821",
        appId: "1:685025117821:web:c3340c8d5475e33eded314"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const OWNER_EMAIL = "fahid.001x@gmail.com";

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const banSnap = await get(child(ref(db), `bans/${user.uid}`));
            if(banSnap.exists()){
                document.getElementById('logged-in-view').classList.add('hidden');
                document.getElementById('ban-view').classList.remove('hidden');
                document.getElementById('ban-reason-text').innerText = "Reason: " + banSnap.val().reason;
                return;
            }
            document.getElementById('logged-in-view').classList.remove('hidden');
            document.getElementById('logged-out-view').classList.add('hidden');
            
            const snap = await get(child(ref(db), `users/${user.uid}`));
            const userData = snap.val();
            document.getElementById('welcome-text').innerText = "Logged in: " + (userData ? userData.username : "User");
            
            if(user.email.toLowerCase() === OWNER_EMAIL || (userData && userData.rank === "admin")) {
                document.getElementById('adminBtn').classList.remove('hidden');
            }

            // Sync Classic Announcement
            onValue(ref(db, 'announcement'), (s) => {
                const container = document.getElementById('announcement-container');
                const display = document.getElementById('announcement-display');
                if(s.exists() && s.val().text) {
                    display.innerText = "NOTICE: " + s.val().text;
                    container.style.display = "block";
                } else { container.style.display = "none"; }
            });

            loadThreads();
        } else {
            document.getElementById('logged-out-view').classList.remove('hidden');
            document.getElementById('logged-in-view').classList.add('hidden');
        }
    });

    async function loadThreads() {
        onValue(ref(db, 'threads'), async (s) => {
            const d = document.getElementById('thread-display'); d.innerHTML = "";
            let threads = []; s.forEach(c => { threads.push({id: c.key, ...c.val()}); });
            threads.reverse();
            for (let p of threads) {
                const uSnap = await get(child(ref(db), `users/${p.uid}`));
                const uD = uSnap.val();
                const row = document.createElement('div');
                row.className = 'thread-row';
                row.innerHTML = `<div><span class="clickable-name ${uD && uD.rank === "owner" ? 'owner-name' : ''}" onclick="openProfile('${p.uid}')">${p.author}</span>: ${p.message}</div>`;
                d.appendChild(row);
            }
        });
    }

    window.openProfile = async (uid) => {
        const snap = await get(child(ref(db), `users/${uid}`));
        if(snap.exists()) {
            const d = snap.val();
            document.getElementById('p-name').innerText = d.username;
            document.getElementById('p-id').innerText = "Forum ID: #" + (d.player_id || "???");
            document.getElementById('p-bio').innerText = d.bio || "No bio set.";
            document.getElementById('profile-overlay').style.display = 'flex';
            
            const editBtn = document.getElementById('edit-bio-btn');
            if(uid === auth.currentUser.uid) {
                editBtn.classList.remove('hidden');
                editBtn.onclick = () => {
                    const newBio = prompt("Enter your new bio:", d.bio || "");
                    if(newBio !== null) {
                        update(ref(db, `users/${uid}`), { bio: newBio });
                        document.getElementById('p-bio').innerText = newBio;
                    }
                };
            } else { editBtn.classList.add('hidden'); }
        }
    };

    document.getElementById('postAnnounce').onclick = () => {
        const txt = document.getElementById('announce-text').value;
        if(txt) set(ref(db, 'announcement'), { text: txt });
    };
    document.getElementById('clearAnnounce').onclick = () => remove(ref(db, 'announcement'));
    document.getElementById('logoutBtn').onclick = () => signOut(auth).then(() => location.reload());
    document.getElementById('adminBtn').onclick = () => document.getElementById('admin-panel').classList.toggle('hidden');
    document.getElementById('submitPost').onclick = () => {
        const m = document.getElementById('post-input').value;
        if(m) push(ref(db, 'threads'), { message: m, author: document.getElementById('welcome-text').innerText.replace("Logged in: ", ""), uid: auth.currentUser.uid });
        document.getElementById('post-input').value = "";
    };
    
    document.getElementById('loginBtn').onclick = () => signInWithEmailAndPassword(auth, document.getElementById('auth-email').value, document.getElementById('auth-password').value);
    document.getElementById('signupBtn').onclick = async () => {
        const u = document.getElementById('reg-username').value;
        const e = document.getElementById('auth-email').value;
        const p = document.getElementById('auth-password').value;
        const g = document.getElementById('reg-gender').value;
        const resTransaction = await runTransaction(ref(db, 'global_id_counter'), (c) => (c || 0) + 1);
        const res = await createUserWithEmailAndPassword(auth, e, p);
        await set(ref(db, 'users/' + res.user.uid), { username: u, gender: g, email: e, rank: "member", player_id: resTransaction.snapshot.val(), bio: "" });
        location.reload();
    };
</script>
</body>
</html>
