<!DOCTYPE html>
<html>
<head>
<title>Rebuilt Social Forum</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#dfe5ec;
}

.topbar {
  background:#3b4f6b;
  color:white;
  padding:10px;
  display:flex;
  align-items:center;
  gap:10px;
}

.logo {
  height:30px;
  cursor:pointer;
}

.menu button {
  margin-left:5px;
  padding:5px;
}

/* SECTIONS */
.section {
  display:none;
  width:850px;
  margin:20px auto;
}

.active { display:block; }

.box {
  background:white;
  border:1px solid #bbb;
  padding:10px;
  margin-bottom:10px;
}

.post {
  background:white;
  border:1px solid #bbb;
  padding:10px;
  margin-top:10px;
}

input, textarea {
  width:100%;
  margin-top:5px;
  padding:5px;
}

.badge {
  font-size:12px;
  color:green;
}
</style>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">

<img class="logo"
src="https://cdn.discordapp.com/attachments/1495473511836291142/1497459975067275389/Logo.png"
onclick="show('posts')">

<span>Social Forum</span>

<div class="menu">
<button onclick="show('posts')">Posts</button>
<button onclick="show('friends')">Friends</button>
<button onclick="show('clans')">Clans</button>
<button onclick="show('admin')">Admin</button>
</div>

</div>

<!-- LOGIN -->
<div id="login" class="section active">
<div class="box">
<h3>Login</h3>
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<button onclick="signup()">Signup</button>
</div>
</div>

<!-- POSTS -->
<div id="posts" class="section">

<div class="box">
<h3>Create Post</h3>
<textarea id="postInput"></textarea>
<button onclick="createPost()">Post</button>
</div>

<div id="postList"></div>

</div>

<!-- FRIENDS -->
<div id="friends" class="section">
<div class="box">
<h3>Friends</h3>
<div id="friendList"></div>
</div>
</div>

<!-- CLANS -->
<div id="clans" class="section">
<div class="box">
<h3>Clans</h3>
<input id="clanName" placeholder="Clan name">
<button onclick="createClan()">Create Clan</button>
<div id="clanList"></div>
</div>
</div>

<!-- ADMIN -->
<div id="admin" class="section">
<div class="box">
<h3>Admin Dashboard</h3>
<textarea id="announce"></textarea>
<button onclick="postAnnouncement()">Post Announcement</button>
</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  query,
  orderBy
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyANfmR8j_Z7mHmSO1GNXGnIGKTdBiU6uiU",
  authDomain: "testingforum-669a9.firebaseapp.com",
  projectId: "testingforum-669a9",
  storageBucket: "testingforum-669a9.firebasestorage.app",
  messagingSenderId: "685025117821",
  appId: "1:685025117821:web:12f3c1bca79906a3ded314"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

/* CENSOR SYSTEM */
function censor(text){
  const badWords = ["badword1","badword2","fuck","shit","nigger","cunt"];
  let out = text;

  badWords.forEach(w=>{
    let regex = new RegExp(w,"gi");
    out = out.replace(regex,"****");
  });

  return out;
}

/* NAV */
window.show = function(id){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
};

/* AUTH */
window.signup = async function(){
  await createUserWithEmailAndPassword(auth,email.value,pass.value);
  show("posts");
};

window.login = async function(){
  await signInWithEmailAndPassword(auth,email.value,pass.value);
  show("posts");
};

/* POSTS */
window.createPost = async function(){

  if(!postInput.value) return;

  await addDoc(collection(db,"posts"),{
    text:censor(postInput.value),
    user:email.value,
    time:Date.now()
  });

  postInput.value="";
  loadPosts();
};

async function loadPosts(){
  let snap = await getDocs(query(collection(db,"posts"),orderBy("time","desc")));

  postList.innerHTML="";

  snap.forEach(d=>{
    let p=d.data();

    let div=document.createElement("div");
    div.className="post";

    div.innerHTML = `<b>${p.user}</b><br>${p.text}`;

    postList.appendChild(div);
  });
}
loadPosts();

/* FRIENDS (basic structure) */
async function loadFriends(){
  friendList.innerHTML="Friend system ready for expansion";
}
loadFriends();

/* CLANS */
window.createClan = async function(){
  await addDoc(collection(db,"clans"),{
    name:clanName.value,
    owner:email.value
  });

  loadClans();
};

async function loadClans(){
  let snap = await getDocs(collection(db,"clans"));

  clanList.innerHTML="";

  snap.forEach(d=>{
    let c=d.data();
    let div=document.createElement("div");

    div.className="post";
    div.innerText="⚔ "+c.name+" (Owner: "+c.owner+")";

    clanList.appendChild(div);
  });
}
loadClans();

/* ANNOUNCEMENT */
window.postAnnouncement = async function(){
  alert("Admin system ready (hooked)");
};

</script>

</body>
</html>
