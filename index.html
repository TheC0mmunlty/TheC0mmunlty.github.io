<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Robloxians - 2012 Legacy</title>
    <style>
        body { font-family: "MS Sans Serif", Geneva, sans-serif; margin: 0; background-image: url('https://wallpapercave.com/wp/wp9084955.jpg'); background-attachment: fixed; background-size: cover; }
        header { background: #0055ff; color: white; padding: 8px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid #0033aa; }
        #announcement-container { background: #ff9800; border-bottom: 2px solid #cc7a00; color: #fff; padding: 12px; font-weight: bold; text-align: center; display: none; font-size: 14px; }
        .main-wrapper { width: 950px; margin: 20px auto; background: rgba(238, 238, 238, 0.95); border: 1px solid #888; min-height: 600px; padding: 20px; box-shadow: 0 0 20px rgba(0,0,0,0.4); }
        .auth-box { text-align: center; padding: 40px; }
        .auth-box input { display: block; margin: 10px auto; padding: 8px; width: 250px; border: 1px solid #777; }
        .forum-header { background: #ddd; color: #333; padding: 8px; font-weight: bold; border: 1px solid #bbb; }
        textarea { width: 100%; box-sizing: border-box; border: 1px solid #ccc; padding: 10px; font-size: 14px; margin-bottom: 10px; }
        .btn { background: #e1e1e1; border: 1px solid #777; padding: 5px 15px; cursor: pointer; font-size: 12px; font-weight: bold; }
        .btn-submit { background: #ffcc00; border-color: #ccaa00; }
        .btn-admin { background: #ffff00; color: #000; border: 1px solid #777; } 
        .btn-danger { background: #ff4444; color: white; border: 1px solid #aa0000; }
        .thread-row { border-bottom: 1px solid #ddd; padding: 12px; background: #fff; display: flex; align-items: center; font-size: 14px; }
        .hidden { display: none !important; }
        #admin-panel { border: 2px solid #0055ff; padding: 15px; margin-bottom: 15px; background: #fff; }
        
        /* PROFILE & AVATAR STYLES */
        .profile-card { background: white; border: 1px solid #ccc; padding: 20px; display: flex; gap: 20px; margin-bottom: 20px; }
        .avatar-box { width: 150px; height: 150px; border: 1px solid #000; background: #eee; position: relative; overflow: hidden; }
        .avatar-box img { width: 100%; height: 100%; object-fit: cover; }
        .ceo-badge { background: gold; color: black; font-weight: bold; padding: 2px 5px; border: 1px solid #000; font-size: 10px; margin-left: 5px; }
        .clickable-name { color: #0055ff; cursor: pointer; text-decoration: underline; font-weight: bold; }
        .tab-btn { padding: 5px 10px; background: #ddd; border: 1px solid #999; cursor: pointer; }
        .active-tab { background: #fff; border-bottom: none; }
    </style>
</head>
<body>

<header>
    <div style="font-weight:bold; font-size: 18px;">ROBLOX - The Robloxians</div>
    <div id="user-display" style="font-size: 12px;">Guest</div>
</header>

<div id="announcement-container"><span id="announcement-display"></span></div>

<div class="main-wrapper">
    <div id="auth-view">
        <div class="auth-box">
            <h2 style="color:#0055ff;">Sign in to The Robloxians</h2>
            <input type="text" id="reg-user" placeholder="Username (New accounts only)">
            <input type="email" id="auth-email" placeholder="Email Address">
            <input type="password" id="auth-pass" placeholder="Password">
            <div style="margin-top:15px;">
                <button class="btn" id="loginBtn">Login</button>
                <button class="btn btn-submit" id="signupBtn">Create Account</button>
            </div>
        </div>
    </div>

    <div id="logged-in-view" class="hidden">
        <div style="display: flex; justify-content: space-between; margin-bottom: 15px; align-items: center;">
            <span id="welcome-text" style="font-weight: bold; font-size: 18px;"></span>
            <div>
                <button class="btn" onclick="showView('forum-home')">Forum</button>
                <button class="btn" id="myProfileBtn">My Profile</button>
                <button class="btn btn-admin hidden" id="adminBtn">Admin</button>
                <button class="btn btn-danger" id="logoutBtn">Logout</button>
            </div>
        </div>

        <div id="admin-panel" class="hidden">
            <strong>Admin Dashboard</strong><br>
            Banner: <input type="text" id="announce-text" placeholder="Global message..." style="width:60%;">
            <button class="btn btn-submit" id="postAnnounce">Save</button>
            <hr>
            UID: <input type="text" id="target-uid" placeholder="UID...">
            <button class="btn" id="applyBan" style="color:red;">Ban</button>
            <button class="btn" id="applyUnban">Unban</button>
        </div>

        <div id="forum-home">
            <div class="forum-header">Community Feed</div>
            <textarea id="post-input" placeholder="What's on your mind?"></textarea>
            <button class="btn btn-submit" id="submitPost">Submit Post</button>
            <div id="thread-display" style="margin-top: 15px;"></div>
        </div>

        <div id="profile-view" class="hidden">
            <div class="profile-card">
                <div class="avatar-box" id="profile-avatar-container">
                    <img id="view-avatar-img" src="https://tr.rbxcdn.com/38c6ed8c6333b4984483d7155056e077/420/420/Avatar/Png" alt="Avatar">
                </div>
                <div style="flex:1;">
                    <h2 id="view-username">User <span id="view-ceo" class="hidden ceo-badge">CEO</span></h2>
                    <p id="view-bio" style="font-style: italic; color: #555;">No bio yet.</p>
                    <div id="edit-profile-area" class="hidden">
                        <textarea id="edit-bio" placeholder="Update bio..."></textarea>
                        <input type="text" id="edit-avatar-url" placeholder="Avatar Image URL">
                        <button class="btn btn-submit" id="saveProfile">Save Changes</button>
                    </div>
                    <div id="friend-actions" class="hidden">
                        <button class="btn btn-submit" id="addFriendBtn">Send Friend Request</button>
                        <button class="btn" id="sendMessageBtn">Send Message</button>
                    </div>
                </div>
            </div>
            
            <div style="display:flex; border-bottom:1px solid #ccc;">
                <div class="tab-btn active-tab" onclick="switchTab('friends')">Friends</div>
                <div class="tab-btn" onclick="switchTab('inbox')">Inbox</div>
            </div>
            <div id="tab-friends" style="padding:10px; background:white; min-height:100px;">
                <div id="friend-list-display">No friends yet.</div>
            </div>
            <div id="tab-inbox" class="hidden" style="padding:10px; background:white; min-height:100px;">
                <div id="inbox-display">No messages.</div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, set, push, onValue, get, child, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyANfmR8j_Z7mHmSO1GNXGnIGKTdBiU6uiU",
        authDomain: "testingforum-669a9.firebaseapp.com",
        databaseURL: "https://testingforum-669a9-default-rtdb.firebaseio.com",
        projectId: "testingforum-669a9",
        storageBucket: "testingforum-669a9.firebasestorage.app",
        messagingSenderId: "685025117821",
        appId: "1:685025117821:web:c3340c8d5475e33eded314"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const OWNER_EMAIL = "fahid.001x@gmail.com";
    const CEO_UID = "oJm6Z87yVpMe5YgO7G4H0vU7T9m2"; // Replace with your actual UID once logged in!

    // --- NAVIGATION ---
    window.showView = (viewId) => {
        ['forum-home', 'profile-view'].forEach(v => document.getElementById(v).classList.add('hidden'));
        document.getElementById(viewId).classList.remove('hidden');
    };

    window.switchTab = (tab) => {
        ['friends', 'inbox'].forEach(t => {
            document.getElementById('tab-'+t).classList.add('hidden');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-tab'));
        });
        document.getElementById('tab-'+tab).classList.remove('hidden');
        event.target.classList.add('active-tab');
    };

    // --- AUTH ---
    document.getElementById('signupBtn').onclick = () => {
        const email = document.getElementById('auth-email').value;
        const pass = document.getElementById('auth-pass').value;
        const user = document.getElementById('reg-user').value;
        if(!user) return alert("Enter a username!");
        createUserWithEmailAndPassword(auth, email, pass).then((res) => {
            set(ref(db, `users/${res.user.uid}`), { username: user, email: email, rank: "member", banned: false, bio: "I'm new here!", avatar: "https://tr.rbxcdn.com/38c6ed8c6333b4984483d7155056e077/420/420/Avatar/Png" });
        }).catch(err => alert(err.message));
    };

    document.getElementById('loginBtn').onclick = () => {
        signInWithEmailAndPassword(auth, document.getElementById('auth-email').value, document.getElementById('auth-pass').value).catch(err => alert(err.message));
    };

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            document.getElementById('auth-view').classList.add('hidden');
            document.getElementById('logged-in-view').classList.remove('hidden');
            const snap = await get(child(ref(db), `users/${user.uid}`));
            const userData = snap.val() || {};
            document.getElementById('welcome-text').innerText = "Hello, " + userData.username + "!";
            
            if(user.email.toLowerCase() === OWNER_EMAIL) document.getElementById('adminBtn').classList.remove('hidden');

            // Load Global Forum
            onValue(ref(db, 'threads'), (s) => {
                const display = document.getElementById('thread-display');
                display.innerHTML = "";
                s.forEach(c => {
                    const p = c.val();
                    const r = document.createElement('div');
                    r.className = 'thread-row';
                    r.innerHTML = `<img src="${p.avatar || ''}" style="width:30px; margin-right:10px;"> 
                                   <span class="clickable-name" onclick="window.loadProfile('${p.uid}')">${p.author}</span>: ${p.message}`;
                    display.prepend(r);
                });
            });

            // Sync Banner
            onValue(ref(db, 'announcement/text'), (s) => {
                const banner = document.getElementById('announcement-container');
                if(s.exists() && s.val() !== "") {
                    document.getElementById('announcement-display').innerText = s.val();
                    banner.style.display = 'block';
                } else banner.style.display = 'none';
            });
        } else {
            document.getElementById('auth-view').classList.remove('hidden');
            document.getElementById('logged-in-view').classList.add('hidden');
        }
    });

    // --- PROFILE LOGIC ---
    window.loadProfile = async (uid) => {
        showView('profile-view');
        const snap = await get(child(ref(db), `users/${uid}`));
        const d = snap.val();
        document.getElementById('view-username').innerText = d.username;
        document.getElementById('view-bio').innerText = d.bio || "No bio.";
        document.getElementById('view-avatar-img').src = d.avatar || "";
        
        // CEO Check
        if(uid === CEO_UID) document.getElementById('view-ceo').classList.remove('hidden');
        else document.getElementById('view-ceo').classList.add('hidden');

        if(uid === auth.currentUser.uid) {
            document.getElementById('edit-profile-area').classList.remove('hidden');
            document.getElementById('friend-actions').classList.add('hidden');
        } else {
            document.getElementById('edit-profile-area').classList.add('hidden');
            document.getElementById('friend-actions').classList.remove('hidden');
            document.getElementById('addFriendBtn').onclick = () => alert("Friend Request Sent!");
            document.getElementById('sendMessageBtn').onclick = () => {
                const m = prompt("Enter message:");
                if(m) push(ref(db, `messages/${uid}`), { from: auth.currentUser.email, text: m });
            };
        }
    };

    document.getElementById('myProfileBtn').onclick = () => window.loadProfile(auth.currentUser.uid);

    document.getElementById('saveProfile').onclick = () => {
        update(ref(db, `users/${auth.currentUser.uid}`), {
            bio: document.getElementById('edit-bio').value,
            avatar: document.getElementById('edit-avatar-url').value || "https://tr.rbxcdn.com/38c6ed8c6333b4984483d7155056e077/420/420/Avatar/Png"
        }).then(() => alert("Profile Saved!"));
    };

    // --- CHAT ---
    document.getElementById('submitPost').onclick = async () => {
        const msg = document.getElementById('post-input').value;
        if(!msg) return;
        const snap = await get(child(ref(db), `users/${auth.currentUser.uid}`));
        const u = snap.val();
        push(ref(db, 'threads'), { message: msg, author: u.username, uid: auth.currentUser.uid, avatar: u.avatar });
        document.getElementById('post-input').value = "";
    };

    // --- ADMIN ---
    document.getElementById('adminBtn').onclick = () => document.getElementById('admin-panel').classList.toggle('hidden');
    document.getElementById('postAnnounce').onclick = () => set(ref(db, 'announcement/text'), document.getElementById('announce-text').value);
    document.getElementById('applyUnban').onclick = () => update(ref(db, `users/${document.getElementById('target-uid').value.trim()}`), { banned: false });
    document.getElementById('applyBan').onclick = () => update(ref(db, `users/${document.getElementById('target-uid').value.trim()}`), { banned: true });
    document.getElementById('logoutBtn').onclick = () => signOut(auth).then(() => location.reload());
</script>
</body>
</html>
