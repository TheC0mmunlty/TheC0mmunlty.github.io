<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Robloxians - 2012 Legacy</title>
    <style>
        body { font-family: "MS Sans Serif", Geneva, sans-serif; margin: 0; background: #ccc url('https://wallpapercave.com/wp/wp9084955.jpg') fixed center; background-size: cover; }
        header { background: #0055ff; color: white; padding: 8px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid #0033aa; }
        #announcement-container { background: #ff9800; border-bottom: 2px solid #cc7a00; color: #fff; padding: 12px; font-weight: bold; text-align: center; display: none; font-size: 14px; }
        .main-wrapper { width: 950px; margin: 20px auto; background: rgba(238, 238, 238, 0.95); border: 1px solid #888; min-height: 600px; padding: 20px; box-shadow: 0 0 20px rgba(0,0,0,0.4); }
        .hidden { display: none !important; }
        .btn { background: #e1e1e1; border: 1px solid #777; padding: 5px 15px; cursor: pointer; font-size: 12px; font-weight: bold; margin: 2px; }
        .btn-submit { background: #ffcc00; border-color: #ccaa00; }
        .btn-danger { background: #ff4444; color: white; border: 1px solid #aa0000; }
        .btn-admin { background: #ffff00; color: #000; border: 1px solid #777; }
        .thread-row { border-bottom: 1px solid #ddd; padding: 12px; background: #fff; display: flex; align-items: center; }
        
        /* THE BLOCKY CHARACTER SYSTEM */
        .avatar-frame { width: 80px; height: 110px; position: relative; background: #e1e1e1; border: 1px solid #999; display: flex; flex-direction: column; align-items: center; transform: scale(0.8); }
        .profile-large .avatar-frame { transform: scale(1.8); margin: 50px; }
        .char-head { width: 20px; height: 20px; border: 1px solid rgba(0,0,0,0.2); z-index: 5; }
        .char-torso { width: 40px; height: 40px; border: 1px solid rgba(0,0,0,0.2); position: relative; }
        .char-arm { width: 15px; height: 38px; border: 1px solid rgba(0,0,0,0.2); position: absolute; top: 0; }
        .arm-l { left: -16px; transform: rotate(5deg); }
        .arm-r { right: -16px; transform: rotate(-5deg); }
        .char-leg { width: 18px; height: 40px; border: 1px solid rgba(0,0,0,0.2); display: inline-block; }
        
        .ceo-glow { outline: 3px solid gold !important; box-shadow: 0 0 15px gold; }
        .ceo-badge { background: gold; color: black; font-weight: bold; padding: 2px 5px; font-size: 10px; border: 1px solid #000; display: inline-block; }

        .auth-box { text-align: center; padding: 40px; }
        .auth-box input { display: block; margin: 10px auto; padding: 8px; width: 250px; border: 1px solid #777; }
        .color-picker { display: flex; gap: 5px; margin: 10px 0; }
        .color-dot { width: 20px; height: 20px; border: 1px solid #000; cursor: pointer; }
        #admin-panel { border: 2px solid #0055ff; padding: 15px; background: #fff; margin-bottom: 15px; }
    </style>
</head>
<body>

<header>
    <div style="font-weight:bold; font-size: 18px;">ROBLOX - The Robloxians</div>
    <div id="user-display">Guest</div>
</header>

<div id="announcement-container"><span id="announcement-display"></span></div>

<div class="main-wrapper">
    <div id="auth-view" class="auth-box">
        <h2 style="color:#0055ff;">Sign in to The Robloxians</h2>
        <input type="text" id="reg-user" placeholder="Username (New users only)">
        <input type="email" id="auth-email" placeholder="Email Address">
        <input type="password" id="auth-pass" placeholder="Password">
        <div style="margin-top:15px;">
            <button class="btn" id="loginBtn">Login</button>
            <button class="btn btn-submit" id="signupBtn">Create Account</button>
        </div>
    </div>

    <div id="logged-in-view" class="hidden">
        <div style="display: flex; justify-content: space-between; margin-bottom: 20px; align-items: center;">
            <div id="welcome-text" style="font-weight:bold;"></div>
            <div>
                <button class="btn" onclick="showView('forum-home')">Forum</button>
                <button class="btn" id="myProfileBtn">My Profile</button>
                <button class="btn btn-admin hidden" id="adminBtn">Admin Panel</button>
                <button class="btn btn-danger" id="logoutBtn">Logout</button>
            </div>
        </div>

        <div id="admin-panel" class="hidden">
            <strong>Admin Dashboard</strong><br>
            Banner: <input type="text" id="announce-text" placeholder="Global message..." style="width:60%;">
            <button class="btn btn-submit" id="postAnnounce">Save</button>
            <hr>
            Target UID: <input type="text" id="target-uid" placeholder="Paste UID here...">
            <button class="btn" id="applyBan" style="color:red;">Ban User</button>
            <button class="btn" id="applyUnban">Unban User</button>
        </div>

        <div id="forum-home">
            <textarea id="post-input" placeholder="What's on your mind?" style="width:100%; height: 50px;"></textarea>
            <button class="btn btn-submit" id="submitPost">Submit Post</button>
            <div id="thread-display" style="margin-top: 20px;"></div>
        </div>

        <div id="profile-view" class="hidden">
            <div style="display:flex; background:white; padding:20px; border:1px solid #ccc;">
                <div class="profile-large" id="profile-render"></div>
                <div style="margin-left: 100px;">
                    <h2 id="view-username">User</h2>
                    <div id="ceo-tag" class="hidden ceo-badge">CEO</div>
                    <p id="view-bio">Loading...</p>
                    
                    <div id="customizer" class="hidden">
                        <hr>
                        <strong>Character Creator</strong>
                        <div class="color-picker">Head: 
                            <div class="color-dot" style="background:#f5cd30" onclick="updateColor('h','#f5cd30')"></div>
                            <div class="color-dot" style="background:#f2f3f3" onclick="updateColor('h','#f2f3f3')"></div>
                            <div class="color-dot" style="background:#635f62" onclick="updateColor('h','#635f62')"></div>
                        </div>
                        <div class="color-picker">Torso: 
                            <div class="color-dot" style="background:#0d5f97" onclick="updateColor('t','#0d5f97')"></div>
                            <div class="color-dot" style="background:#a06110" onclick="updateColor('t','#a06110')"></div>
                            <div class="color-dot" style="background:#212121" onclick="updateColor('t','#212121')"></div>
                        </div>
                        <div class="color-picker">Legs: 
                            <div class="color-dot" style="background:#212121" onclick="updateColor('l','#212121')"></div>
                            <div class="color-dot" style="background:#a06110" onclick="updateColor('l','#a06110')"></div>
                            <div class="color-dot" style="background:#0d5f97" onclick="updateColor('l','#0d5f97')"></div>
                        </div>
                        Bio: <textarea id="edit-bio" style="width:100%;"></textarea>
                        <button class="btn btn-submit" id="saveProfile">Save Changes</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, set, push, onValue, get, child, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyANfmR8j_Z7mHmSO1GNXGnIGKTdBiU6uiU",
        authDomain: "testingforum-669a9.firebaseapp.com",
        databaseURL: "https://testingforum-669a9-default-rtdb.firebaseio.com",
        projectId: "testingforum-669a9",
        storageBucket: "testingforum-669a9.firebasestorage.app",
        messagingSenderId: "685025117821",
        appId: "1:685025117821:web:c3340c8d5475e33eded314"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const OWNER_EMAIL = "fahid.001x@gmail.com";
    const CEO_UID = "oJm6Z87yVpMe5YgO7G4H0vU7T9m2";

    function createAvatarHTML(colors, isCEO) {
        let torsoColor = colors.t;
        if (colors.h === colors.t) torsoColor = "#0d5f97"; 
        return `
            <div class="avatar-frame ${isCEO ? 'ceo-glow' : ''}">
                <div class="char-head" style="background:${colors.h}"></div>
                <div class="char-torso" style="background:${torsoColor}">
                    <div class="char-arm arm-l" style="background:${colors.h}"></div>
                    <div class="char-arm arm-r" style="background:${colors.h}"></div>
                </div>
                <div style="display:flex;">
                    <div class="char-leg" style="background:${colors.l}"></div>
                    <div class="char-leg" style="background:${colors.l}"></div>
                </div>
            </div>`;
    }

    window.showView = (id) => {
        ['forum-home', 'profile-view', 'auth-view'].forEach(v => {
            const el = document.getElementById(v);
            if(el) el.classList.add('hidden');
        });
        document.getElementById(id).classList.remove('hidden');
    };

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            onValue(ref(db, `users/${user.uid}/banned`), (snap) => {
                if(snap.val() === true) { alert("Banned."); signOut(auth).then(()=>location.reload()); }
            });

            document.getElementById('auth-view').classList.add('hidden');
            document.getElementById('logged-in-view').classList.remove('hidden');
            if(user.email.toLowerCase() === OWNER_EMAIL) document.getElementById('adminBtn').classList.remove('hidden');
            
            const uSnap = await get(child(ref(db), `users/${user.uid}`));
            const uData = uSnap.val() || {};
            document.getElementById('welcome-text').innerText = "Logged in as: " + uData.username;
            document.getElementById('user-display').innerText = uData.username;

            onValue(ref(db, 'threads'), async (s) => {
                const display = document.getElementById('thread-display');
                display.innerHTML = "";
                const allUsersSnap = await get(child(ref(db), 'users'));
                const allUsers = allUsersSnap.val() || {};
                s.forEach(c => {
                    const p = c.val();
                    const authorData = allUsers[p.uid] || {};
                    const isBanned = authorData.banned === true;
                    const displayName = isBanned ? "[ Content Deleted ]" : (authorData.username || p.author);
                    const div = document.createElement('div');
                    div.className = 'thread-row';
                    const av = createAvatarHTML(authorData.colors || {h:'#f5cd30', t:'#0d5f97', l:'#a06110'}, p.uid === CEO_UID);
                    div.innerHTML = `${av} <div style="margin-left:20px;">
                        <strong style="color:#0055ff; cursor:pointer;" onclick="loadProfile('${p.uid}')">${displayName}</strong><br>
                        ${isBanned ? '<i style="color:gray;">This message was removed.</i>' : p.message}
                    </div>`;
                    display.prepend(div);
                });
            });

            onValue(ref(db, 'announcement/text'), (s) => {
                const banner = document.getElementById('announcement-container');
                if(s.exists() && s.val() !== "") {
                    document.getElementById('announcement-display').innerText = s.val();
                    banner.style.display = 'block';
                } else banner.style.display = 'none';
            });
        } else {
            showView('auth-view');
            document.getElementById('user-display').innerText = "Guest";
        }
    });

    document.getElementById('signupBtn').onclick = () => {
        const email = document.getElementById('auth-email').value;
        const pass = document.getElementById('auth-pass').value;
        const user = document.getElementById('reg-user').value;
        if(!user) return alert("Enter a username!");
        createUserWithEmailAndPassword(auth, email, pass).then((res) => {
            set(ref(db, `users/${res.user.uid}`), { 
                username: user, 
                email: email, 
                banned: false, 
                bio: "New to the community!", 
                colors: {h:'#f5cd30', t:'#0d5f97', l:'#a06110'} 
            });
        }).catch(err => alert(err.message));
    };

    document.getElementById('loginBtn').onclick = () => {
        signInWithEmailAndPassword(auth, document.getElementById('auth-email').value, document.getElementById('auth-pass').value).catch(err => alert(err.message));
    };

    window.loadProfile = async (uid) => {
        showView('profile-view');
        const snap = await get(child(ref(db), `users/${uid}`));
        const d = snap.val();
        const isBanned = d.banned === true;
        document.getElementById('view-username').innerText = isBanned ? "[ Content Deleted ]" : d.username;
        document.getElementById('view-bio').innerText = isBanned ? "Account Suspended." : (d.bio || "No bio.");
        document.getElementById('profile-render').innerHTML = createAvatarHTML(d.colors || {h:'#f5cd30', t:'#0d5f97', l:'#a06110'}, uid === CEO_UID);
        if(uid === CEO_UID) document.getElementById('ceo-tag').classList.remove('hidden');
        else document.getElementById('ceo-tag').classList.add('hidden');
        if(auth.currentUser && auth.currentUser.uid === uid) {
            document.getElementById('customizer').classList.remove('hidden');
            document.getElementById('edit-bio').value = d.bio || "";
        } else document.getElementById('customizer').classList.add('hidden');
    };

    window.updateColor = (part, color) => {
        get(child(ref(db), `users/${auth.currentUser.uid}/colors`)).then(s => {
            let current = s.val() || {h:'#f5cd30', t:'#0d5f97', l:'#a06110'};
            current[part] = color;
            update(ref(db, `users/${auth.currentUser.uid}`), { colors: current }).then(() => loadProfile(auth.currentUser.uid));
        });
    };

    document.getElementById('saveProfile').onclick = () => {
        update(ref(db, `users/${auth.currentUser.uid}`), { bio: document.getElementById('edit-bio').value }).then(() => alert("Saved!"));
    };

    document.getElementById('adminBtn').onclick = () => document.getElementById('admin-panel').classList.toggle('hidden');
    document.getElementById('postAnnounce').onclick = () => set(ref(db, 'announcement/text'), document.getElementById('announce-text').value);
    document.getElementById('applyBan').onclick = () => update(ref(db, `users/${document.getElementById('target-uid').value.trim()}`), { banned: true }).then(()=>alert("Banned."));
    document.getElementById('applyUnban').onclick = () => update(ref(db, `users/${document.getElementById('target-uid').value.trim()}`), { banned: false }).then(()=>alert("Unbanned."));
    document.getElementById('submitPost').onclick = async () => {
        const msg = document.getElementById('post-input').value;
        if(!msg) return;
        push(ref(db, 'threads'), { message: msg, uid: auth.currentUser.uid });
        document.getElementById('post-input').value = "";
    };
    document.getElementById('myProfileBtn').onclick = () => loadProfile(auth.currentUser.uid);
    document.getElementById('logoutBtn').onclick = () => signOut(auth).then(() => location.reload());
</script>
</body>
</html>
