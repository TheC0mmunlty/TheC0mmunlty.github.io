<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Robloxians Forum</title>
    <style>
        body { 
            font-family: Verdana, Geneva, sans-serif; 
            margin: 0; padding: 0; 
            background-color: #000; 
            background-image: url('https://wallpapercave.com/wp/wp9084955.jpg'); 
            background-attachment: fixed; 
            background-size: cover; 
            background-position: center; 
        }
        header { background: #000; color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #555; }
        .main-wrapper { width: 900px; margin: 30px auto; background: #fff; border: 1px solid #888; min-height: 800px; box-shadow: 0px 0px 20px rgba(0,0,0,0.5); position: relative; }
        #announcement-banner { background: #FF8C00; border-bottom: 2px solid #CC7000; padding: 10px; text-align: center; font-size: 13px; font-weight: bold; color: white; display: none; }
        .auth-card { width: 400px; margin: 80px auto; border: 1px solid #0055ff; background: #f0f5ff; padding: 20px; text-align: center; }
        input, select, textarea { width: 90%; padding: 6px; margin: 5px 0; border: 1px solid #999; font-family: Verdana; font-size: 12px; }
        .forum-header { background: #ccc; color: #000; padding: 8px; font-weight: bold; margin-top: 15px; font-size: 13px; border: 1px solid #999; border-left: none; border-right: none; }
        .thread-row { border-bottom: 1px solid #eee; padding: 12px; display: flex; justify-content: space-between; align-items: flex-start; font-size: 12px; background: #fff; }
        .clickable-name { color: #0055ff; cursor: pointer; text-decoration: underline; font-weight: bold; }
        .btn { background: #e1e1e1; border: 1px solid #777; padding: 4px 10px; cursor: pointer; font-size: 11px; font-family: Verdana; }
        .btn-admin { background: #ffcc00; font-weight: bold; border-color: #b89600; }
        .btn-danger { background: #ff4444; color: white; border: 1px solid #800; }
        .hidden { display: none !important; }
        #profile-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; z-index: 100; justify-content: center; align-items: center; }
        .profile-card { background: white; padding: 20px; border: 2px solid #555; width: 350px; text-align: center; box-shadow: 5px 5px 0px #000; }
        #ban-view { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #900; color: #fff; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
    </style>
</head>
<body>

<div id="ban-view" class="hidden">
    <h1 style="font-family: Arial Black; font-size: 40px;">BANNED</h1>
    <p id="ban-reason" style="font-size: 20px;"></p>
</div>

<div id="announcement-banner"></div>

<header>
    <div style="font-weight:bold; font-size: 18px;">THE ROBLOXIANS FORUM</div>
    <div id="user-display" style="font-size: 11px; color: #ccc;">Guest</div>
</header>

<div id="profile-overlay">
    <div class="profile-card">
        <h2 id="p-name" style="margin: 0; font-size: 18px;">User Profile</h2>
        <p id="p-id" style="font-size: 12px; color: #d00; font-weight: bold; margin: 4px 0;"></p> 
        <p id="p-gender" style="color: #666; font-size: 12px;"></p>
        <hr>
        <div style="text-align: left; max-height: 100px; overflow-y: auto; font-size: 12px;">
            <strong>Friends:</strong><div id="p-friends"></div>
        </div>
        <hr>
        <button class="btn" id="addFriendBtn">Add Friend</button>
        <button class="btn btn-danger" id="reportBtn">Report</button>
        <button class="btn" onclick="document.getElementById('profile-overlay').style.display='none'">Close</button>
    </div>
</div>

<div class="main-wrapper">
    <div id="logged-out-view" class="hidden">
        <div class="auth-card">
            <h3>Login / Signup</h3>
            <input type="text" id="reg-username" placeholder="Username">
            <input type="email" id="auth-email" placeholder="Email">
            <input type="password" id="auth-password" placeholder="Password">
            <select id="reg-gender"><option value="Boy">Boy</option><option value="Girl">Girl</option></select>
            <div style="margin-top:15px;">
                <button class="btn" id="loginBtn">Login</button>
                <button class="btn" id="signupBtn">Sign Up</button>
            </div>
        </div>
    </div>

    <div id="logged-in-view" class="hidden">
        <div style="background: #e1e1e1; padding: 8px; border-bottom: 1px solid #ccc; display: flex; justify-content: space-between; align-items: center;">
            <span id="welcome-text" style="font-size: 11px; font-weight: bold;">Loading...</span>
            <div>
                <button class="btn btn-admin hidden" id="adminBtn">Admin Panel</button>
                <button class="btn" id="logoutBtn">Logout</button>
            </div>
        </div>

        <div id="admin-panel" class="hidden" style="border: 2px dashed orange; padding: 15px; margin: 15px; background: #fffdf0;">
            <strong style="color: #e67e22; font-size: 12px;">Admin Management</strong><br>
            <div style="margin-top:10px;">
                <input type="text" id="admin-msg-input" placeholder="Banner message..." style="width: 70%;">
                <button class="btn" id="updateAnnouncement">Set Banner</button>
            </div>
            <hr>
            <div style="font-size: 11px;">
                <strong>User Control (Paste UID):</strong><br>
                <input type="text" id="target-uid" placeholder="User UID" style="width: 80%;"><br>
                <button class="btn btn-admin" id="applyRank">Rank Admin</button>
                <button class="btn" id="removeRank">Unrank</button>
                <button class="btn btn-danger" id="applyBan">Ban User</button>
            </div>
        </div>

        <div style="padding: 15px;">
            <div class="forum-header">General Discussion - Post Message</div>
            <div style="padding: 15px; border: 1px solid #ccc; border-top: none; background: #f9f9f9;">
                <textarea id="post-input" placeholder="No swearing! Filter is active."></textarea><br>
                <button class="btn" id="submitPost" style="margin-top:8px; font-weight: bold;">Post Message</button>
            </div>
            <div class="forum-header" style="margin-top:20px;">Thread List</div>
            <div id="thread-display" style="border: 1px solid #ccc; border-top: none; background: #fff;"></div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, set, push, onValue, get, child, remove, query, orderByChild, equalTo, update, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyANfmR8j_Z7mHmSO1GNXGnIGKTdBiU6uiU",
        authDomain: "testingforum-669a9.firebaseapp.com",
        databaseURL: "https://testingforum-669a9-default-rtdb.firebaseio.com",
        projectId: "testingforum-669a9",
        storageBucket: "testingforum-669a9.firebasestorage.app",
        messagingSenderId: "685025117821",
        appId: "1:685025117821:web:c3340c8d5475e33eded314"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    const OWNER_EMAIL = "fahid.001x@gmail.com"; 
    let currentUsername = "";

    // FILTER LOGIC
    const badWords = ["fuck", "shit", "ass", "bitch", "crap", "nigger", "retard", "faggot", "cum", "kys", "kill yourself", "porn", "gooner", "nigga", "asshole", "shitting", "groom", "rape", "raped","dick", "xnxx", "faggoter", "cock", "fag", "dounche", "dounchebag"];
    const filterText = (text) => {
        let clean = text;
        badWords.forEach(word => {
            const regex = new RegExp("\\b" + word + "\\b", "gi");
            clean = clean.replace(regex, "####");
        });
        return clean;
    };

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const banSnap = await get(child(ref(db), `bans/${user.uid}`));
            if(banSnap.exists()){
                document.getElementById('ban-view').classList.remove('hidden');
                document.getElementById('ban-reason').innerText = "Reason: " + banSnap.val().reason;
                return;
            }

            const snap = await get(child(ref(db), `users/${user.uid}`));
            let userData = snap.val();

            // OWNER AUTO-ID SETTER
            if(user.email.toLowerCase() === OWNER_EMAIL.toLowerCase() && (!userData || userData.player_id !== 1)) {
                await update(ref(db, `users/${user.uid}`), { player_id: 1, rank: "admin" });
                userData = (await get(child(ref(db), `users/${user.uid}`))).val();
            }

            currentUsername = userData ? userData.username : user.email;
            document.getElementById('welcome-text').innerText = "Welcome, " + currentUsername;
            document.getElementById('logged-in-view').classList.remove('hidden');
            document.getElementById('logged-out-view').classList.add('hidden');

            const isAdmin = (user.email.toLowerCase() === OWNER_EMAIL.toLowerCase()) || (userData && userData.rank === "admin");
            if(isAdmin) document.getElementById('adminBtn').classList.remove('hidden');
            loadThreads(isAdmin);
        } else {
            document.getElementById('logged-out-view').classList.remove('hidden');
            document.getElementById('logged-in-view').classList.add('hidden');
        }
    });

    document.getElementById('submitPost').onclick = () => {
        const msg = document.getElementById('post-input').value.trim();
        if(msg) push(ref(db, 'threads'), { message: filterText(msg), author: currentUsername, uid: auth.currentUser.uid });
        document.getElementById('post-input').value = "";
    };

    function loadThreads(isAdmin) {
        onValue(ref(db, 'threads'), (s) => {
            const d = document.getElementById('thread-display'); d.innerHTML = "";
            s.forEach(c => {
                const p = c.val();
                const row = document.createElement('div');
                row.className = 'thread-row';
                row.innerHTML = `
                    <div><span class="clickable-name" data-uid="${p.uid}">${p.author}</span>: <span>${p.message}</span></div>
                    ${(p.uid === auth.currentUser.uid || isAdmin) ? `<button class="del-btn" data-id="${c.key}" style="color:red; border:none; background:none; cursor:pointer;">[x]</button>` : ""}
                `;
                d.prepend(row);
            });
            d.onclick = (e) => {
                if(e.target.classList.contains('clickable-name')) openProfile(e.target.dataset.uid);
                if(e.target.classList.contains('del-btn')) remove(ref(db, `threads/${e.target.dataset.id}`));
            };
        });
    }

    document.getElementById('updateAnnouncement').onclick = () => set(ref(db, 'site_settings/announcement'), document.getElementById('admin-msg-input').value);
    onValue(ref(db, 'site_settings/announcement'), (s) => {
        const b = document.getElementById('announcement-banner');
        if(s.exists() && s.val() !== "") { b.innerText = s.val(); b.style.display = "block"; } else { b.style.display = "none"; }
    });

    window.openProfile = async (uid) => {
        const snap = await get(child(ref(db), `users/${uid}`));
        if(snap.exists()) {
            const d = snap.val();
            document.getElementById('p-name').innerText = d.username;
            document.getElementById('p-id').innerText = "User ID: " + (d.player_id || "LEGACY");
            document.getElementById('p-gender').innerText = "Gender: " + d.gender;
            document.getElementById('profile-overlay').style.display = 'flex';
            window.history.pushState({}, '', '?id=' + (d.player_id || 0));
        }
    };

    document.getElementById('applyRank').onclick = () => update(ref(db, `users/${document.getElementById('target-uid').value}`), { rank: "admin" });
    document.getElementById('removeRank').onclick = () => update(ref(db, `users/${document.getElementById('target-uid').value}`), { rank: "member" });
    document.getElementById('applyBan').onclick = () => set(ref(db, `bans/${document.getElementById('target-uid').value}`), { reason: "Admin Action" });

    document.getElementById('signupBtn').onclick = async () => {
        const u = document.getElementById('reg-username').value.trim();
        const e = document.getElementById('auth-email').value.trim();
        const p = document.getElementById('auth-password').value;
        const g = document.getElementById('reg-gender').value;
        try {
            const idRef = ref(db, 'global_id_counter');
            const result = await runTransaction(idRef, (c) => (c || 0) + 1);
            const res = await createUserWithEmailAndPassword(auth, e, p);
            await set(ref(db, 'users/' + res.user.uid), { username: u, gender: g, email: e, rank: "member", player_id: result.snapshot.val() });
            location.reload();
        } catch(err) { alert(err.message); }
    };
    document.getElementById('loginBtn').onclick = () => signInWithEmailAndPassword(auth, document.getElementById('auth-email').value, document.getElementById('auth-password').value);
    document.getElementById('logoutBtn').onclick = () => signOut(auth).then(() => location.reload());
    document.getElementById('adminBtn').onclick = () => document.getElementById('admin-panel').classList.toggle('hidden');
</script>
</body>
</html>
