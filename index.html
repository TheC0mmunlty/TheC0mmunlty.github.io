<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ROBLOX Forum - Admin Edition</title>
    <style>
        body { font-family: Verdana, Arial; background-color: #E1E1E1; margin: 0; padding: 0; }
        header { background: #000; color: white; padding: 12px; display: flex; justify-content: space-between; border-bottom: 3px solid #555; }
        
        /* 2012 YELLOW ANNOUNCEMENT */
        #announcement-banner { background: #FFF6CF; border: 1px solid #E6DB55; padding: 10px; text-align: center; font-size: 13px; font-weight: bold; color: #555; margin-bottom: 10px; }

        .main-wrapper { width: 950px; margin: 0 auto; background: white; border: 1px solid #888; min-height: 800px; }
        
        /* AUTH SECTION */
        .auth-card { width: 400px; margin: 100px auto; border: 1px solid #0055ff; background: #f0f5ff; padding: 20px; text-align: center; }
        input, select, textarea { width: 90%; padding: 8px; margin: 5px 0; border: 1px solid #999; font-family: Verdana; }

        /* FORUM CONTENT */
        .forum-header { background: #ccc; border: 1px solid #999; padding: 8px; font-weight: bold; margin-top: 15px; }
        .thread-row { border-bottom: 1px solid #eee; padding: 10px; display: flex; justify-content: space-between; font-size: 12px; }
        .admin-only { background: #ffebeb; border: 2px solid red; padding: 15px; margin-top: 20px; }
        
        .btn { background: #ddd; border: 1px solid #777; padding: 5px 10px; cursor: pointer; }
        .btn-red { background: #ff4444; color: white; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="announcement-banner">
    [!] ITrapp Is Gonna hack our site again!
</div>

<header>
    <div style="font-weight:bold;">ROBLOX FORUM</div>
    <div id="user-display">Guest</div>
</header>

<div class="main-wrapper">

    <div id="logged-out-view">
        <div class="auth-card">
            <h3>Login or Register</h3>
            <input type="text" id="username" placeholder="Username">
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Password">
            <select id="gender">
                <option value="Boy">Boy</option>
                <option value="Girl">Girl</option>
            </select>
            <br><br>
            <button class="btn" id="loginBtn">Login</button>
            <button class="btn" id="signupBtn">Sign Up</button>
        </div>
    </div>

    <div id="logged-in-view" class="hidden">
        <div style="padding: 20px;">
            <h2>Welcome back, <span id="display-name">User</span>!</h2>
            <button class="btn" id="logoutBtn">Logout</button>
            <button class="btn" id="adminToggle" style="display:none; background: gold;">Admin Dashboard</button>

            <div class="forum-header">Post a New Message</div>
            <div style="padding: 10px; border: 1px solid #ccc;">
                <textarea id="post-text" placeholder="What's on your mind?"></textarea>
                <button class="btn" id="submitPost">Post to General</button>
            </div>

            <div class="forum-header">General Discussion</div>
            <div id="thread-list">
                </div>
        </div>

        <div id="admin-panel" class="hidden admin-only">
            <h3>Admin Dashboard (Owner Only)</h3>
            <p>Manage Users:</p>
            <input type="text" id="target-user-id" placeholder="User UID">
            <button class="btn btn-red">Ban Perm</button>
            <button class="btn">Ban 1 Day</button>
            <hr>
            <p>Update Yellow Announcement:</p>
            <input type="text" id="new-announcement" placeholder="Banner text...">
            <button class="btn">Update Banner</button>
        </div>
    </div>

</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, set, push, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyANfmR8j_Z7mHmSO1GNXGnIGKTdBiU6uiU",
        authDomain: "testingforum-669a9.firebaseapp.com",
        databaseURL: "https://testingforum-669a9-default-rtdb.firebaseio.com",
        projectId: "testingforum-669a9",
        storageBucket: "testingforum-669a9.firebasestorage.app",
        messagingSenderId: "685025117821",
        appId: "1:685025117821:web:c3340c8d5475e33eded314"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    // --- CHANGE THIS TO YOUR EMAIL ---
    const ADMIN_EMAIL = "your-email@gmail.com"; 

    // AUTH ACTIONS
    document.getElementById('signupBtn').onclick = async () => {
        const user = document.getElementById('username').value;
        const em = document.getElementById('email').value;
        const pw = document.getElementById('password').value;
        const gen = document.getElementById('gender').value;
        const res = await createUserWithEmailAndPassword(auth, em, pw);
        await set(ref(db, 'users/' + res.user.uid), { username: user, gender: gen, email: em });
    };

    document.getElementById('loginBtn').onclick = () => {
        signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value);
    };

    document.getElementById('logoutBtn').onclick = () => signOut(auth);

    // POSTING ACTION
    document.getElementById('submitPost').onclick = async () => {
        const text = document.getElementById('post-text').value;
        const user = auth.currentUser;
        if(!text) return;
        
        const postRef = ref(db, 'threads');
        await push(postRef, {
            message: text,
            author: user.email,
            timestamp: Date.now()
        });
        document.getElementById('post-text').value = "";
    };

    // UI UPDATES
    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('logged-out-view').classList.add('hidden');
            document.getElementById('logged-in-view').classList.remove('hidden');
            document.getElementById('user-display').innerText = user.email;
            
            if(user.email === ADMIN_EMAIL) {
                document.getElementById('adminToggle').style.display = "inline-block";
            }

            // Load Posts
            onValue(ref(db, 'threads'), (snapshot) => {
                const list = document.getElementById('thread-list');
                list.innerHTML = "";
                snapshot.forEach((child) => {
                    const data = child.val();
                    list.innerHTML += `<div class="thread-row"><span>${data.message}</span> <b>By: ${data.author}</b></div>`;
                });
            });
        } else {
            document.getElementById('logged-out-view').classList.remove('hidden');
            document.getElementById('logged-in-view').classList.add('hidden');
        }
    });

    // Admin Toggle
    document.getElementById('adminToggle').onclick = () => {
        document.getElementById('admin-panel').classList.toggle('hidden');
    };
</script>
</body>
</html>
