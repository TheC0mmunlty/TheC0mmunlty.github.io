<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ROBLOX Forums - 2014</title>
  
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

  <style>
    * { box-sizing: border-box; }
    body {
      font-family: "Tahoma", Arial, sans-serif;
      background: #c8c8c8;
      margin: 0;
      padding: 0;
      color: #000;
    }

    .header {
      background: #003399;
      color: #ffcc00;
      padding: 12px 0;
      text-align: center;
      border-bottom: 8px solid #ffcc00;
      font-size: 34px;
      font-weight: bold;
      text-shadow: 4px 4px 0 #000;
    }

    .nav {
      background: #002266;
      padding: 10px 0;
      text-align: center;
      border-bottom: 5px solid #ffcc00;
    }

    .nav a {
      color: #ffcc00;
      margin: 0 20px;
      text-decoration: none;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
    }

    .main-container {
      max-width: 1000px;
      margin: 20px auto;
      background: #eeeeee;
      border: 5px solid #003399;
      box-shadow: 6px 6px 0 #222;
    }

    .category-header {
      background: #003399;
      color: #ffcc00;
      padding: 14px 20px;
      font-size: 22px;
      font-weight: bold;
      border-bottom: 5px solid #ffcc00;
    }

    .auth-box, .new-thread-box {
      margin: 20px;
      padding: 18px;
      background: #f8f8f8;
      border: 4px solid #003399;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin-bottom: 12px;
      border: 3px solid #003399;
      font-family: Tahoma;
      font-size: 15px;
    }

    button {
      background: #003399;
      color: #ffcc00;
      border: 4px solid #ffcc00;
      padding: 10px 20px;
      font-weight: bold;
      font-size: 15px;
      cursor: pointer;
    }

    button:hover { background: #ffcc00; color: #003399; }

    .thread, .post {
      background: white;
      border: 3px solid #003399;
      margin: 15px 20px;
      padding: 16px;
      overflow: hidden;
    }

    .thread:hover { background: #ffffcc; }

    .thread-title { font-size: 18px; font-weight: bold; color: #003399; }
    .thread-meta { font-size: 13px; color: #555; margin-top: 6px; }

    .avatar {
      width: 68px;
      height: 68px;
      border: 4px solid #ffcc00;
      float: left;
      margin-right: 15px;
      border-radius: 6px;
      object-fit: cover;
      box-shadow: 3px 3px 0 #000;
    }

    .avatar-option {
      width: 75px;
      height: 75px;
      margin: 6px;
      border: 3px solid #003399;
      cursor: pointer;
      border-radius: 8px;
    }

    .avatar-option.selected {
      border-color: #ffcc00;
      box-shadow: 0 0 0 5px #ffcc00;
    }

    .logged-in { 
      float: right; 
      color: #ffcc00; 
      margin-top: 8px; 
      font-size: 14px; 
    }
  </style>
</head>
<body>

  <div class="header">ROBLOX OLD FORUMS - 2014</div>

  <div class="nav">
    <a onclick="showCategory('general')">General Discussion</a>
    <a onclick="showCategory('help')">Help & Support</a>
    <a onclick="showCategory('offtopic')">Off Topic</a>
    <a onclick="showCategory('suggestions')">Suggestions</a>
    <span class="logged-in">Logged in as: <strong id="username">Not logged in</strong></span>
  </div>

  <div class="main-container">
    <div class="category-header" id="current-category">General Discussion</div>

    <!-- Sign Up with Avatar Selector -->
    <div id="auth-box" class="auth-box">
      <h3>Sign Up</h3>
      <input type="email" id="email" placeholder="Email">
      <input type="password" id="password" placeholder="Password">

      <p><strong>Choose your avatar:</strong></p>
      <div id="avatar-selector" style="display:flex; flex-wrap:wrap; gap:10px; margin-bottom:15px;"></div>

      <button onclick="signUp()">Create Account</button>
      <button onclick="login()" style="background:#555;">Login</button>
    </div>

    <!-- New Thread -->
    <div id="new-thread-box" class="new-thread-box" style="display:none;">
      <h3>Create New Thread</h3>
      <input type="text" id="thread-title" placeholder="Thread Title">
      <textarea id="thread-content" rows="5" placeholder="Message..."></textarea>
      <button onclick="createThread()">Post Thread</button>
    </div>

    <div id="threads-list"></div>

    <div id="thread-view" style="display:none;">
      <button onclick="backToList()" style="margin:15px 20px;">← Back</button>
      <div id="original-post" class="post"></div>
      <div id="replies-list"></div>

      <div class="new-thread-box" style="margin:20px;">
        <h3>Reply</h3>
        <textarea id="reply-content" rows="4" placeholder="Write reply..."></textarea>
        <button onclick="postReply()">Post Reply</button>
      </div>
    </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyANfmR8j_Z7mHmSO1GNXGnIGKTdBiU6uiU",
      authDomain: "testingforum-669a9.firebaseapp.com",
      databaseURL: "https://testingforum-669a9-default-rtdb.firebaseio.com",
      projectId: "testingforum-669a9",
      storageBucket: "testingforum-669a9.firebasestorage.app",
      messagingSenderId: "685025117821",
      appId: "1:685025117821:web:3fe96e8e7fc440eeded314"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const database = firebase.database();

    let currentCategory = 'general';
    let currentThreadId = null;
    let selectedAvatar = "";

    // Your avatars from the album (update these with direct i.imgur.com links when possible)
    const availableAvatars = [
      "https://i.imgur.com/R4Qq6S8.png",   // Hat avatar you just sent
      // Add more direct links here when you get them
    ];

    function createAvatarSelector() {
      const container = document.getElementById("avatar-selector");
      container.innerHTML = "";

      availableAvatars.forEach((url, index) => {
        const img = document.createElement("img");
        img.src = url;
        img.className = "avatar-option";
        img.onclick = () => {
          document.querySelectorAll('.avatar-option').forEach(i => i.classList.remove('selected'));
          img.classList.add('selected');
          selectedAvatar = url;
        };
        if (index === 0) {
          img.classList.add('selected');
          selectedAvatar = url;
        }
        container.appendChild(img);
      });
    }

    function getAvatarHtml(avatarUrl) {
      return `<img src="${avatarUrl || availableAvatars[0]}" class="avatar" onerror="this.src='https://i.imgur.com/R4Qq6S8.png'">`;
    }

    function signUp() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!email || !password) return alert("Email and password required!");
      if (!selectedAvatar) return alert("Please choose an avatar!");

      auth.createUserWithEmailAndPassword(email, password)
        .then(() => {
          alert("✅ Account created! Now click Login.");
        })
        .catch(err => alert("Sign Up Error: " + err.message));
    }

    function login() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      if (!email || !password) return alert("Email and password required!");

      auth.signInWithEmailAndPassword(email, password)
        .then(() => alert("✅ Logged in!"))
        .catch(err => alert("Login Error: " + err.message));
    }

    function showCategory(cat) {
      currentCategory = cat;
      const names = { general: "General Discussion", help: "Help & Support", offtopic: "Off Topic", suggestions: "Suggestions" };
      document.getElementById("current-category").textContent = names[cat];
      loadThreads();
    }

    function loadThreads() {
      document.getElementById("threads-list").innerHTML = "<p style='padding:40px;text-align:center'>Loading...</p>";
      // ... (same as before)
    }

    // Initialize
    auth.onAuthStateChanged((user) => {
      const loggedIn = !!user;
      document.getElementById("auth-box").style.display = loggedIn ? "none" : "block";
      document.getElementById("new-thread-box").style.display = loggedIn ? "block" : "none";
      document.getElementById("username").textContent = user ? (user.displayName || user.email.split('@')[0]) : "Not logged in";
    });

    window.onload = () => {
      createAvatarSelector();
      showCategory('general');
    };
  </script>
</body>
</html>
