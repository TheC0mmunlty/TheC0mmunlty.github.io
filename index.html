<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Robloxians - 2012 Legacy</title>
    <style>
        body { font-family: "MS Sans Serif", Geneva, sans-serif; margin: 0; background: #ccc url('https://wallpapercave.com/wp/wp9084955.jpg') fixed center; background-size: cover; }
        header { background: #0055ff; color: white; padding: 8px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid #0033aa; }
        #announcement-container { background: #ff9800; border-bottom: 2px solid #cc7a00; color: #fff; padding: 12px; font-weight: bold; text-align: center; display: none; font-size: 14px; }
        .main-wrapper { width: 950px; margin: 20px auto; background: rgba(238, 238, 238, 0.95); border: 1px solid #888; min-height: 600px; padding: 20px; box-shadow: 0 0 20px rgba(0,0,0,0.4); }
        .hidden { display: none !important; }
        .btn { background: #e1e1e1; border: 1px solid #777; padding: 5px 15px; cursor: pointer; font-size: 12px; font-weight: bold; margin: 2px; }
        .btn-submit { background: #ffcc00; border-color: #ccaa00; }
        .btn-danger { background: #ff4444; color: white; border: 1px solid #aa0000; }
        .btn-admin { background: #ffff00; color: #000; border: 1px solid #777; }
        .thread-row { border-bottom: 1px solid #ddd; padding: 12px; background: #fff; display: flex; align-items: center; position: relative; }
        
        .avatar-frame { width: 80px; height: 110px; position: relative; background: #e1e1e1; border: 1px solid #999; display: flex; flex-direction: column; align-items: center; transform: scale(0.8); }
        .char-head { width: 20px; height: 20px; border: 1px solid rgba(0,0,0,0.2); z-index: 5; }
        .char-torso { width: 40px; height: 40px; border: 1px solid rgba(0,0,0,0.2); position: relative; }
        .char-arm { width: 15px; height: 38px; border: 1px solid rgba(0,0,0,0.2); position: absolute; top: 0; }
        .arm-l { left: -16px; transform: rotate(5deg); }
        .arm-r { right: -16px; transform: rotate(-5deg); }
        .char-leg { width: 18px; height: 40px; border: 1px solid rgba(0,0,0,0.2); display: inline-block; }
        
        .ceo-glow { outline: 3px solid gold !important; box-shadow: 0 0 15px gold; }
        .ceo-badge { background: gold; color: black; font-weight: bold; padding: 2px 5px; font-size: 10px; border: 1px solid #000; display: inline-block; }
        .user-id-tag { font-size: 10px; color: #666; margin-left: 5px; }

        .auth-box { text-align: center; padding: 40px; }
        .auth-box input { display: block; margin: 10px auto; padding: 8px; width: 250px; border: 1px solid #777; }
        #admin-panel { border: 2px solid #0055ff; padding: 15px; background: #fff; margin-bottom: 15px; }
        
        .delete-btn { position: absolute; right: 10px; top: 10px; font-size: 10px; padding: 2px 5px; color: red; border: 1px solid red; background: none; cursor: pointer; }
        .delete-btn:hover { background: #ffeeee; }
    </style>
</head>
<body>

<header>
    <div style="font-weight:bold; font-size: 18px;">ROBLOX - The Robloxians</div>
    <div id="user-display">Guest</div>
</header>

<div id="announcement-container"><span id="announcement-display"></span></div>

<div class="main-wrapper">
    <div id="auth-view" class="auth-box">
        <h2 style="color:#0055ff;">Sign in to The Robloxians</h2>
        <input type="text" id="reg-user" placeholder="Username">
        <input type="email" id="auth-email" placeholder="Email Address">
        <input type="password" id="auth-pass" placeholder="Password">
        <div style="margin-top:15px;">
            <button class="btn" id="loginBtn">Login</button>
            <button class="btn btn-submit" id="signupBtn">Create Account</button>
        </div>
    </div>

    <div id="logged-in-view" class="hidden">
        <div style="display: flex; justify-content: space-between; margin-bottom: 20px; align-items: center;">
            <div id="welcome-text" style="font-weight:bold;"></div>
            <div>
                <button class="btn" onclick="showView('forum-home')">Forum</button>
                <button class="btn" id="myProfileBtn">My Profile</button>
                <button class="btn btn-admin hidden" id="adminBtn">Staff Tools</button>
                <button class="btn btn-danger" id="logoutBtn">Logout</button>
            </div>
        </div>

        <div id="admin-panel" class="hidden">
            <h3 id="panel-title">Staff Dashboard</h3>
            
            <div id="admin-only-section" class="hidden">
                <strong>Global Banner:</strong> 
                <input type="text" id="announce-text" placeholder="Global message..." style="width:50%;">
                <button class="btn btn-submit" id="postAnnounce">Save Banner</button>
                <hr>
                <strong>Rank/Unrank User:</strong><br>
                UID: <input type="text" id="rank-uid" placeholder="User UID...">
                Rank: <select id="rank-select" class="btn">
                    <option value="0">Player</option>
                    <option value="1">Moderator</option>
                    <option value="2">Admin</option>
                </select>
                <button class="btn btn-submit" id="applyRank">Update Rank</button>
                <hr>
            </div>

            <strong>Ban Hammer:</strong><br>
            Target UID: <input type="text" id="target-uid" placeholder="Paste UID here...">
            Reason: <input type="text" id="ban-reason-input" placeholder="Enter reason for player...">
            Length: <select id="ban-duration" class="btn">
                <option value="perm">Permanent</option>
                <option value="1">1 Day</option>
                <option value="3">3 Days</option>
                <option value="7">7 Days</option>
            </select>
            <button class="btn btn-danger" id="applyBan">Apply Ban</button>
            <button class="btn" id="applyUnban">Unban User</button>
        </div>

        <div id="forum-home">
            <textarea id="post-input" placeholder="What's on your mind?" style="width:100%; height: 50px;"></textarea>
            <button class="btn btn-submit" id="submitPost">Submit Post</button>
            <div id="thread-display" style="margin-top: 20px;"></div>
        </div>

        <div id="profile-view" class="hidden">
            <div style="display:flex; background:white; padding:20px; border:1px solid #ccc;">
                <div class="profile-large" id="profile-render"></div>
                <div style="margin-left: 100px;">
                    <h2 id="view-username">User</h2>
                    <div id="view-id" class="user-id-tag">ID: 0</div>
                    <div id="ceo-tag" class="hidden ceo-badge">CEO</div>
                    <p id="view-bio">Legacy Member</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, set, push, onValue, get, child, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyANfmR8j_Z7mHmSO1GNXGnIGKTdBiU6uiU",
        authDomain: "testingforum-669a9.firebaseapp.com",
        databaseURL: "https://testingforum-669a9-default-rtdb.firebaseio.com",
        projectId: "testingforum-669a9",
        storageBucket: "testingforum-669a9.firebasestorage.app",
        messagingSenderId: "685025117821",
        appId: "1:685025117821:web:c3340c8d5475e33eded314"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    
    const OWNER_EMAIL = "fahid.001x@gmail.com";
    const CEO_UID = "oJm6Z87yVpMe5YgO7G4H0vU7T9m2";
    let currentUserRank = 0;

    const BAD_WORDS = ["badword1", "badword2", "badword3"]; 

    function filterText(text) {
        let clean = text;
        BAD_WORDS.forEach(word => {
            const regex = new RegExp(word, "gi");
            clean = clean.replace(regex, "####");
        });
        return clean;
    }

    function createAvatarHTML(colors, isCEO) {
        return `<div class="avatar-frame ${isCEO ? 'ceo-glow' : ''}"><div class="char-head" style="background:${colors.h}"></div><div class="char-torso" style="background:${colors.t}"><div class="char-arm arm-l" style="background:${colors.h}"></div><div class="char-arm arm-r" style="background:${colors.h}"></div></div><div style="display:flex;"><div class="char-leg" style="background:${colors.l}"></div><div class="char-leg" style="background:${colors.l}"></div></div></div>`;
    }

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            onValue(ref(db, `users/${user.uid}`), (snap) => {
                const data = snap.val();
                if(!data) return;

                if(data.banned === true) {
                    const now = Date.now();
                    if(data.banExpires === "perm" || now < data.banExpires) {
                        alert(`BANNED\nReason: ${data.banReason || "No reason given"}`);
                        signOut(auth).then(()=>location.reload());
                    } else {
                        update(ref(db, `users/${user.uid}`), { banned: false });
                    }
                }

                currentUserRank = data.rank || 0;
                if(currentUserRank >= 1 || user.email === OWNER_EMAIL) {
                    document.getElementById('adminBtn').classList.remove('hidden');
                    if(currentUserRank >= 2 || user.email === OWNER_EMAIL) {
                        document.getElementById('admin-only-section').classList.remove('hidden');
                    }
                }

                document.getElementById('welcome-text').innerText = "Hello, " + data.username;
                document.getElementById('user-display').innerText = data.username;
            });

            document.getElementById('auth-view').classList.add('hidden');
            document.getElementById('logged-in-view').classList.remove('hidden');

            // THREAD RENDERING
            onValue(ref(db, 'threads'), async (s) => {
                const display = document.getElementById('thread-display');
                display.innerHTML = "";
                const usersSnap = await get(child(ref(db), 'users'));
                const allUsers = usersSnap.val() || {};
                
                s.forEach(c => {
                    const postId = c.key;
                    const p = c.val();
                    const author = allUsers[p.uid] || {};
                    const div = document.createElement('div');
                    div.className = 'thread-row';
                    
                    // Show Delete button if: User is Staff OR User is Author (and author isn't CEO)
                    const canDelete = (currentUserRank >= 1) || (p.uid === auth.currentUser.uid);
                    const isProtected = (p.uid === CEO_UID && auth.currentUser.uid !== CEO_UID);
                    
                    const deleteBtnHtml = (canDelete && !isProtected) ? `<button class="delete-btn" onclick="deletePost('${postId}')">Delete</button>` : "";

                    div.innerHTML = `
                        ${createAvatarHTML(author.colors || {h:'#f5cd30', t:'#0d5f97', l:'#a06110'}, p.uid === CEO_UID)} 
                        <div style="margin-left:20px;">
                            <strong style="color:#0055ff; cursor:pointer;" onclick="loadProfile('${p.uid}')">${author.banned ? '[ Content Deleted ]' : author.username}</strong><br>
                            ${author.banned ? '<i>[Post Removed]</i>' : p.message}
                        </div>
                        ${deleteBtnHtml}`;
                    display.prepend(div);
                });
            });

            onValue(ref(db, 'announcement/text'), (s) => {
                const banner = document.getElementById('announcement-container');
                if(s.exists() && s.val() !== "") {
                    document.getElementById('announcement-display').innerText = s.val();
                    banner.style.display = 'block';
                } else banner.style.display = 'none';
            });
        } else { showView('auth-view'); }
    });

    // GLOBAL DELETE FUNCTION
    window.deletePost = (id) => {
        if(confirm("Are you sure you want to remove this message?")) {
            remove(ref(db, `threads/${id}`)).then(() => alert("Message Deleted."));
        }
    };

    document.getElementById('applyBan').onclick = () => {
        const uid = document.getElementById('target-uid').value.trim();
        const reason = filterText(document.getElementById('ban-reason-input').value.trim());
        const days = document.getElementById('ban-duration').value;
        if(uid === CEO_UID) return alert("Error: Target is immune to moderation.");
        let expiry = "perm";
        if(days !== "perm") expiry = Date.now() + (parseInt(days) * 86400000);
        update(ref(db, `users/${uid}`), { banned: true, banExpires: expiry, banReason: reason || "Violation of rules" }).then(()=>alert("User Banned."));
    };

    document.getElementById('applyRank').onclick = () => {
        const uid = document.getElementById('rank-uid').value.trim();
        const newRank = parseInt(document.getElementById('rank-select').value);
        if(uid === CEO_UID) return alert("Error: Target rank is locked.");
        update(ref(db, `users/${uid}`), { rank: newRank }).then(()=>alert("Rank updated."));
    };

    document.getElementById('signupBtn').onclick = () => {
        const user = document.getElementById('reg-user').value.trim();
        if(filterText(user).includes("####")) return alert("Username contains blocked words!");
        createUserWithEmailAndPassword(auth, document.getElementById('auth-email').value, document.getElementById('auth-pass').value).then((res) => {
            set(ref(db, `users/${res.user.uid}`), { username: user, rank: 0, banned: false, colors: {h:'#f5cd30', t:'#0d5f97', l:'#a06110'} });
        });
    };

    document.getElementById('postAnnounce').onclick = () => {
        const cleanBanner = filterText(document.getElementById('announce-text').value);
        set(ref(db, 'announcement/text'), cleanBanner);
    };

    document.getElementById('submitPost').onclick = () => {
        const cleanMsg = filterText(document.getElementById('post-input').value);
        if(!cleanMsg) return;
        push(ref(db, 'threads'), { message: cleanMsg, uid: auth.currentUser.uid });
        document.getElementById('post-input').value = "";
    };

    document.getElementById('applyUnban').onclick = () => update(ref(db, `users/${document.getElementById('target-uid').value.trim()}`), { banned: false });
    document.getElementById('loginBtn').onclick = () => signInWithEmailAndPassword(auth, document.getElementById('auth-email').value, document.getElementById('auth-pass').value);
    document.getElementById('logoutBtn').onclick = () => signOut(auth).then(() => location.reload());
    document.getElementById('adminBtn').onclick = () => document.getElementById('admin-panel').classList.toggle('hidden');
    document.getElementById('myProfileBtn').onclick = () => loadProfile(auth.currentUser.uid);
    window.showView = (id) => { document.getElementById('forum-home').classList.add('hidden'); document.getElementById('profile-view').classList.add('hidden'); document.getElementById(id).classList.remove('hidden'); };
    window.loadProfile = async (uid) => { showView('profile-view'); const snap = await get(child(ref(db), `users/${uid}`)); const d = snap.val(); document.getElementById('view-username').innerText = d.username; document.getElementById('profile-render').innerHTML = createAvatarHTML(d.colors || {h:'#f5cd30', t:'#0d5f97', l:'#a06110'}, uid === CEO_UID); };
</script>
</body>
</html>
