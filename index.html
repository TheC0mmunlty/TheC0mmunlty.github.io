<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Robloxians</title>
    <style>
        * { font-family: "MS Sans Serif", Geneva, sans-serif; -webkit-font-smoothing: none; box-sizing: border-box; }
        body { margin: 0; background: #ccc url('https://wallpapercave.com/wp/wp9084955.jpg') fixed center; background-size: cover; }
        header { background: #0055ff; color: white; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid #0033aa; }
        .logo-text { font-weight:bold; font-size: 18px; cursor: pointer; user-select: none; }
        .header-meta { font-size: 10px; font-weight: bold; text-transform: uppercase; color: #ffd700; }
        #announcement-banner { background: #ff9800; color: #ffffff; padding: 10px; text-align: center; font-weight: bold; font-size: 14px; width: 100%; display: none; border-bottom: 3px solid #e68a00; }
        .main-wrapper { width: 1000px; margin: 10px auto; background: rgba(238, 238, 238, 0.98); border: 1px solid #888; min-height: 700px; padding: 20px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .hidden { display: none !important; }
        .btn { background: #e1e1e1; border: 1px solid #777; padding: 4px 12px; cursor: pointer; font-size: 12px; font-weight: bold; box-shadow: inset 1px 1px #fff, inset -1px -1px #999; }
        .btn-red { background: #ff4444; color: white; border: 1px solid #aa0000; }
        .btn-yellow { background: #ffcc00; color: black; border: 1px solid #ccaa00; }
        .verified-badge { width: 14px; height: 14px; vertical-align: middle; margin-left: 4px; display: inline-block; background: url('https://upload.wikimedia.org/wikipedia/commons/e/e4/Twitter_Verified_Badge.svg') no-repeat center; background-size: contain; }
        
        /* AVATAR SYSTEM */
        .avatar-frame { width: 80px; height: 110px; position: relative; background: #eee; border: 1px solid #999; display: flex; flex-direction: column; align-items: center; margin: 10px; }
        .char-head { width: 22px; height: 22px; border: 1px solid rgba(0,0,0,0.2); z-index: 5; position: relative; margin-top: 10px; }
        
        /* CSS RECREATED GOLD CROWN */
        .hat-goldcrown { 
            position: absolute; top: -12px; left: -2px; width: 26px; height: 12px; 
            background: #ffd700; z-index: 12; border: 1px solid #b8860b;
            clip-path: polygon(0% 100%, 0% 0%, 25% 50%, 50% 0%, 75% 50%, 100% 0%, 100% 100%);
        }
        .hat-goldcrown::after {
            content: ''; position: absolute; bottom: -2px; left: -1px; width: 26px; height: 3px; background: #b8860b;
        }

        .hat-domino { position: absolute; top: -14px; left: -9px; width: 40px; height: 28px; z-index: 10; pointer-events: none; }
        .hat-tophat { position: absolute; top: -16px; left: 1px; width: 20px; height: 16px; background: #222; z-index: 10; border-bottom: 2px solid #444; }
        .hat-tophat::before { content: ''; position: absolute; bottom: -2px; left: -4px; width: 28px; height: 4px; background: #222; border-radius: 2px; }
        
        .char-torso { width: 44px; height: 44px; border: 1px solid rgba(0,0,0,0.2); position: relative; }
        .tshirt-layer { position: absolute; top: 2px; left: 2px; width: 40px; height: 40px; object-fit: contain; z-index: 2; pointer-events: none; }
        .char-arm { width: 16px; height: 42px; border: 1px solid rgba(0,0,0,0.2); position: absolute; top: 0; }
        .arm-l { left: -17px; } .arm-r { right: -17px; }
        .char-leg-set { display: flex; }
        .char-leg { width: 20px; height: 44px; border: 1px solid rgba(0,0,0,0.2); }
        
        .market-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin-top: 20px; }
        .market-card { background: white; border: 1px solid #999; padding: 10px; text-align: center; font-size: 11px; }
        .row { border-bottom: 1px solid #ddd; padding: 15px; background: #fff; display: flex; align-items: center; position: relative; }
        .delete-btn { position: absolute; right: 10px; top: 10px; color: red; font-size: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div>
        <div class="logo-text" onclick="location.reload()">The Robloxians</div>
        <div id="rank-indicator" class="header-meta">GUEST</div>
    </div>
    <div id="user-display">User: Guest</div>
</header>

<div id="announcement-banner"></div>

<div class="main-wrapper">
    <div id="auth-view" style="text-align:center; padding:50px;">
        <h2>Login / Sign Up</h2>
        <input type="text" id="reg-user" placeholder="Username" style="display:block; margin:10px auto; padding:8px; width:250px;">
        <input type="email" id="auth-email" placeholder="Email" style="display:block; margin:10px auto; padding:8px; width:250px;">
        <input type="password" id="auth-pass" placeholder="Password" style="display:block; margin:10px auto; padding:8px; width:250px;">
        <button class="btn btn-yellow" id="loginBtn">Login</button>
        <button class="btn" id="signupBtn">Sign Up</button>
    </div>

    <div id="logged-in-view" class="hidden">
        <div style="display: flex; justify-content: space-between; margin-bottom: 20px; border-bottom: 2px solid #ccc; padding-bottom: 10px;">
            <div>
                <button class="btn" onclick="showView('forum-home')">Forum</button>
                <button class="btn" onclick="showView('market-view')">Marketplace</button>
                <button class="btn" onclick="showView('inbox-view')">Inbox</button>
                <button class="btn" id="myProfileBtn">My Profile</button>
                <button class="btn btn-red hidden" id="adminBtn" onclick="showView('admin-view')">ADMIN</button>
            </div>
            <button class="btn" id="logoutBtn">Logout</button>
        </div>

        <div id="forum-home">
            <textarea id="post-input" placeholder="Say something..." style="width:100%; height: 60px;"></textarea>
            <button class="btn btn-yellow" id="submitPost" style="width:100%; margin-top:5px;">Post</button>
            <div id="thread-display"></div>
        </div>

        <div id="market-view" class="hidden">
            <h3>Marketplace</h3>
            <div id="market-list" class="market-grid"></div>
        </div>

        <div id="inbox-view" class="hidden">
            <h3>Messages</h3>
            <div id="message-display"></div>
        </div>

        <div id="profile-view" class="hidden">
            <div style="display:flex; background:white; padding:20px; border:1px solid #ccc; gap:30px;">
                <div id="profile-render"></div>
                <div style="flex-grow: 1;">
                    <h2><span id="v-name"></span><span id="v-check"></span> <span id="v-id" style="color:#888; font-size:12px;"></span></h2>
                    
                    <div id="uploader-section" class="hidden">
                        <hr>
                        <strong>Upload T-Shirt</strong><br>
                        <input type="file" id="tshirt-file-input" accept="image/*" style="font-size:11px; margin: 5px 0;"><br>
                        <button class="btn btn-yellow" id="upload-btn">Upload to Market (5s)</button>
                    </div>

                    <div id="my-settings" class="hidden">
                        <hr>
                        <strong>Customization</strong><br>
                        Hat: <select id="h-select">
                            <option value="none">None</option>
                            <option value="domino">Domino Crown</option>
                            <option value="tophat">Top Hat</option>
                            <option id="gold-crown-opt" value="goldcrown" class="hidden">Gold Crown (OWNER)</option>
                        </select><br>
                        Colors: <input type="color" id="c-head"> <input type="color" id="c-torso"> <input type="color" id="c-leg"><br>
                        <button class="btn btn-red" onclick="unequipShirt()" style="margin-top:5px;">Unequip T-Shirt</button><br>
                        <button class="btn btn-yellow" id="saveProfile" style="margin-top:10px;">Save Character</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="admin-view" class="hidden">
            <div style="border: 2px solid #aa0000; padding: 20px; background: #fff;">
                <h2 style="color:#aa0000;">Staff Panel</h2>
                <input type="text" id="target-uid" placeholder="User UID"><br>
                <button class="btn btn-red" onclick="banUser()">BAN</button>
                <button class="btn btn-yellow" onclick="toggleVerified()">VERIFY</button>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, set, push, onValue, get, child, update, increment, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const cfg = { apiKey: "AIzaSyANfmR8j_Z7mHmSO1GNXGnIGKTdBiU6uiU", authDomain: "testingforum-669a9.firebaseapp.com", databaseURL: "https://testingforum-669a9-default-rtdb.firebaseio.com", projectId: "testingforum-669a9", storageBucket: "testingforum-669a9.firebasestorage.app", messagingSenderId: "685025117821", appId: "1:685025117821:web:c3340c8d5475e33eded314" };
    const app = initializeApp(cfg); const auth = getAuth(app); const db = getDatabase(app);
    let me = null;

    function draw(colors, hat, tshirtUrl) {
        let h = '';
        if(hat === 'domino') h = `<img src="https://i.imgur.com/e2aPq6G.png" class="hat-domino">`;
        else if(hat === 'tophat') h = `<div class="hat-tophat"></div>`;
        else if(hat === 'goldcrown') h = `<div class="hat-goldcrown"></div>`; 
        
        const c = colors || {h:'#f5cd30', t:'#0d5f97', l:'#a06110'};
        return `<div class="avatar-frame">
            <div class="char-head" style="background:${c.h}">${h}</div>
            <div class="char-torso" style="background:${c.t}">
                ${tshirtUrl ? `<img src="${tshirtUrl}" class="tshirt-layer">` : ''}
                <div class="char-arm arm-l" style="background:${c.h}"></div>
                <div class="char-arm arm-r" style="background:${c.h}"></div>
            </div>
            <div class="char-leg-set">
                <div class="char-leg" style="background:${c.l}"></div>
                <div class="char-leg" style="background:${c.l}"></div>
            </div>
        </div>`;
    }

    onAuthStateChanged(auth, (u) => {
        if (u) {
            if(u.email === "fahid.001x@gmail.com") document.getElementById('gold-crown-opt').classList.remove('hidden');
            onValue(ref(db, `users/${u.uid}`), (s) => {
                me = s.val() || {};
                if(me.isBanned) { signOut(auth); location.reload(); return; }
                document.getElementById('user-display').innerText = "Logged in as: " + (me.username || "Guest");
                document.getElementById('adminBtn').classList.toggle('hidden', (me.rank || 0) < 1);
                const ind = document.getElementById('rank-indicator');
                ind.innerText = me.rank === 2 ? "ADMIN" : (me.rank === 1 ? "MOD" : "USER");
                renderForum(); renderMarket();
            });
            document.getElementById('auth-view').classList.add('hidden');
            document.getElementById('logged-in-view').classList.remove('hidden');
        }
    });

    // RESTORED OLD FILE UPLOADER LOGIC
    document.getElementById('upload-btn').onclick = () => {
        const file = document.getElementById('tshirt-file-input').files[0];
        if(!file) return alert("Select a file first");
        
        const reader = new FileReader();
        document.getElementById('upload-btn').innerText = "Uploading...";
        
        reader.onloadend = () => {
            const base64String = reader.result;
            setTimeout(() => {
                push(ref(db, 'marketplace'), { 
                    img: base64String, 
                    creator: me.username, 
                    uid: auth.currentUser.uid 
                });
                document.getElementById('upload-btn').innerText = "Upload to Market (5s)";
                alert("T-Shirt Live!");
            }, 5000);
        };
        reader.readAsDataURL(file);
    };

    window.buyItem = (url) => {
        update(ref(db, `users/${auth.currentUser.uid}`), { equipped: url });
        alert("Equipped!");
    };

    window.unequipShirt = () => {
        update(ref(db, `users/${auth.currentUser.uid}`), { equipped: "" });
    };

    window.renderMarket = () => {
        onValue(ref(db, 'marketplace'), (s) => {
            const list = document.getElementById('market-list'); list.innerHTML = "";
            s.forEach(c => {
                const item = c.val();
                const div = document.createElement('div'); div.className = 'market-card';
                div.innerHTML = `<img src="${item.img}" style="width:60px; height:60px; object-fit:contain;"><br>By: ${item.creator}<br><button class="btn btn-yellow" onclick="buyItem('${item.img}')">EQUIP</button>`;
                list.prepend(div);
            });
        });
    };

    const renderForum = () => {
        onValue(ref(db, 'threads'), async (s) => {
            const display = document.getElementById('thread-display'); display.innerHTML = "";
            const users = (await get(child(ref(db), 'users'))).val() || {};
            s.forEach(c => {
                const p = c.val(); const author = users[p.uid] || {};
                const div = document.createElement('div'); div.className = 'row';
                div.innerHTML = `
                    <div style="transform:scale(0.5); width:40px;">${draw(author.colors, author.hat, author.equipped)}</div>
                    <div style="margin-left:20px;">
                        <strong onclick="window.loadProfile('${p.uid}')" style="cursor:pointer; color:blue;">${author.username || 'User'}</strong>
                        <div>${p.msg}</div>
                    </div>`;
                display.prepend(div);
            });
        });
    };

    window.loadProfile = async (uid) => {
        showView('profile-view');
        const d = (await get(child(ref(db), `users/${uid}`))).val() || {};
        document.getElementById('v-name').innerText = d.username || "Unknown";
        document.getElementById('profile-render').innerHTML = draw(d.colors, d.hat, d.equipped);
        const isMe = uid === auth.currentUser.uid;
        document.getElementById('my-settings').classList.toggle('hidden', !isMe);
        document.getElementById('uploader-section').classList.toggle('hidden', !isMe);
    };

    window.showView = (id) => { 
        ['forum-home', 'profile-view', 'admin-view', 'market-view', 'inbox-view'].forEach(v => document.getElementById(v).classList.add('hidden')); 
        document.getElementById(id).classList.remove('hidden'); 
    };

    document.getElementById('saveProfile').onclick = () => update(ref(db, `users/${auth.currentUser.uid}`), { hat: document.getElementById('h-select').value, colors: { h: document.getElementById('c-head').value, t: document.getElementById('c-torso').value, l: document.getElementById('c-leg').value } });
    document.getElementById('submitPost').onclick = () => { push(ref(db, 'threads'), {msg: document.getElementById('post-input').value, uid: auth.currentUser.uid}); document.getElementById('post-input').value = ""; };
    document.getElementById('myProfileBtn').onclick = () => window.loadProfile(auth.currentUser.uid);
    document.getElementById('logoutBtn').onclick = () => signOut(auth).then(()=>location.reload());

    document.getElementById('signupBtn').onclick = async () => {
        const u = document.getElementById('reg-user').value;
        const e = document.getElementById('auth-email').value;
        const p = document.getElementById('auth-pass').value;
        const r = await createUserWithEmailAndPassword(auth, e, p);
        await set(ref(db, `users/${r.user.uid}`), { username: u, rank: 0, colors: {h:'#f5cd30', t:'#0d5f97', l:'#a06110'}, hat: 'none' });
    };
    document.getElementById('loginBtn').onclick = () => signInWithEmailAndPassword(auth, document.getElementById('auth-email').value, document.getElementById('auth-pass').value);
</script>
</body>
</html>
