<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ROBLOX Forums - 2014</title>
  
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

  <style>
    * { box-sizing: border-box; }
    body {
      font-family: "Tahoma", Arial, sans-serif;
      background: #c8c8c8;
      margin: 0;
      padding: 0;
      color: #000;
    }

    .header {
      background: #003399;
      color: #ffcc00;
      padding: 12px 0;
      text-align: center;
      border-bottom: 8px solid #ffcc00;
      font-size: 34px;
      font-weight: bold;
      text-shadow: 4px 4px 0 #000;
    }

    .nav {
      background: #002266;
      padding: 10px 0;
      text-align: center;
      border-bottom: 5px solid #ffcc00;
    }

    .nav a, .nav span {
      color: #ffcc00;
      margin: 0 12px;
      text-decoration: none;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
    }

    .main-container {
      max-width: 1000px;
      margin: 20px auto;
      background: #eeeeee;
      border: 5px solid #003399;
      box-shadow: 6px 6px 0 #222;
    }

    .category-header {
      background: #003399;
      color: #ffcc00;
      padding: 14px 20px;
      font-size: 22px;
      font-weight: bold;
      border-bottom: 5px solid #ffcc00;
    }

    .auth-box {
      margin: 20px;
      padding: 18px;
      background: #f8f8f8;
      border: 4px solid #003399;
      text-align: center;
    }

    .welcome-image {
      width: 100%;
      max-width: 650px;
      border: 5px solid #003399;
      margin-bottom: 25px;
    }

    input, textarea, select {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border: 3px solid #003399;
      font-family: Tahoma;
      font-size: 15px;
    }

    button {
      background: #003399;
      color: #ffcc00;
      border: 4px solid #ffcc00;
      padding: 12px 25px;
      font-weight: bold;
      font-size: 15px;
      cursor: pointer;
      margin: 8px;
    }

    button:hover { background: #ffcc00; color: #003399; }

    .thread, .post {
      background: white;
      border: 3px solid #003399;
      margin: 15px 20px;
      padding: 16px;
      overflow: hidden;
    }

    .thread:hover { background: #ffffcc; cursor: pointer; }

    .thread-title { font-size: 18px; font-weight: bold; color: #003399; }
    .thread-meta { font-size: 13px; color: #555; margin-top: 6px; }

    .avatar {
      width: 68px;
      height: 68px;
      border: 4px solid #ffcc00;
      float: left;
      margin-right: 15px;
      border-radius: 6px;
      object-fit: cover;
      box-shadow: 3px 3px 0 #000;
    }

    .logged-in { 
      float: right; 
      color: #ffcc00; 
      margin-top: 8px; 
      font-size: 14px; 
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="header">ROBLOX OLD FORUMS - 2014</div>

  <div class="nav">
    <a onclick="showCategory('general')">General</a>
    <a onclick="showCategory('help')">Help</a>
    <a onclick="showCategory('offtopic')">Off Topic</a>
    <a onclick="showCategory('suggestions')">Suggestions</a>
    <a onclick="showFriends()">Friends</a>
    <a onclick="showAdminPanel()" id="admin-link" style="display:none; color:#ffff00; font-weight:bold;">Admin</a>
    <span class="logged-in" id="username-display">Not logged in</span>
    <span class="logged-in" id="logout-btn" onclick="logout()" style="display:none; color:#ff6666;">Logout</span>
  </div>

  <div class="main-container">
    <div class="category-header" id="current-category">General Discussion</div>

    <!-- Sign Up / Login Screen -->
    <div id="auth-box" class="auth-box">
      <img src="https://i.imgur.com/89Pvm9d.png" class="welcome-image" alt="Welcome">
      <h3>Sign Up</h3>
      <input type="email" id="email" placeholder="Email">
      <input type="password" id="password" placeholder="Password">
      <select id="gender">
        <option value="">Select Gender</option>
        <option value="Boy">Boy</option>
        <option value="Girl">Girl</option>
      </select>
      <button onclick="signUp()">Create Account</button>
      <button onclick="login()" style="background:#555;">Login</button>
    </div>

    <!-- New Thread -->
    <div id="new-thread-box" style="display:none; margin:20px; padding:18px; background:#f8f8f8; border:4px solid #003399;">
      <h3>Create New Thread</h3>
      <input type="text" id="thread-title" placeholder="Thread Title">
      <textarea id="thread-content" rows="5" placeholder="Write your message..."></textarea>
      <button onclick="createThread()">Post Thread</button>
    </div>

    <div id="threads-list"></div>

    <div id="thread-view" style="display:none;">
      <button onclick="backToList()" style="margin:15px 20px;">← Back to List</button>
      <div id="original-post" class="post"></div>
      <div id="replies-list"></div>

      <div style="margin:20px; padding:18px; background:#f8f8f8; border:4px solid #003399;">
        <h3>Reply to this thread</h3>
        <textarea id="reply-content" rows="4" placeholder="Write your reply here..."></textarea>
        <button onclick="postReply()">Post Reply</button>
      </div>
    </div>

    <!-- Admin Dashboard -->
    <div id="admin-page" style="display:none; padding:20px; background:#f8f8f8; border:4px solid #ff0000;">
      <h3>🔧 Admin Dashboard</h3>
      <div style="margin-bottom:20px;">
        <h4>Post Announcement</h4>
        <input type="text" id="announcement-input" placeholder="Type announcement..." style="width:70%;">
        <button onclick="postAnnouncement()">Post Announcement</button>
      </div>
      <button onclick="backToMain()">Back to Forum</button>
    </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyANfmR8j_Z7mHmSO1GNXGnIGKTdBiU6uiU",
      authDomain: "testingforum-669a9.firebaseapp.com",
      databaseURL: "https://testingforum-669a9-default-rtdb.firebaseio.com",
      projectId: "testingforum-669a9",
      storageBucket: "testingforum-669a9.firebasestorage.app",
      messagingSenderId: "685025117821",
      appId: "1:685025117821:web:3fe96e8e7fc440eeded314"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const database = firebase.database();

    let currentCategory = 'general';
    let currentThreadId = null;
    let currentUser = null;
    const OWNER_EMAIL = "fahid.001x@gmail.com";   // ← CHANGE THIS TO YOUR REAL EMAIL

    const defaultAvatar = "https://i.imgur.com/R4Qq6S8.png";

    function getAvatarHtml() {
      return `<img src="${defaultAvatar}" class="avatar">`;
    }

    function showCategory(cat) {
      currentCategory = cat;
      const names = { general: "General Discussion", help: "Help & Support", offtopic: "Off Topic", suggestions: "Suggestions" };
      document.getElementById("current-category").textContent = names[cat];
      hideAllPages();
      document.getElementById("threads-list").style.display = "block";
      loadThreads();
    }

    function hideAllPages() {
      document.getElementById("auth-box").style.display = "none";
      document.getElementById("new-thread-box").style.display = "none";
      document.getElementById("thread-view").style.display = "none";
      document.getElementById("admin-page").style.display = "none";
    }

    function loadThreads() {
      document.getElementById("threads-list").innerHTML = "<p style='padding:40px;text-align:center'>Loading threads...</p>";

      database.ref(currentCategory + '/threads').on('value', (snapshot) => {
        const data = snapshot.val();
        let html = '';
        if (data) {
          Object.keys(data).reverse().forEach(key => {
            const t = data[key];
            html += `
              <div class="thread" onclick="openThread('${key}')">
                ${getAvatarHtml()}
                <div style="margin-left:80px">
                  <div class="thread-title">${t.title}</div>
                  <div class="thread-meta">Posted by ${t.author}</div>
                </div>
              </div>`;
          });
        } else {
          html = `<p style="padding:40px;text-align:center;color:#666">No threads yet. Be the first to post!</p>`;
        }
        document.getElementById("threads-list").innerHTML = html;
      });
    }

    function createThread() {
      const title = document.getElementById("thread-title").value.trim();
      const content = document.getElementById("thread-content").value.trim();
      if (!title || !content) return alert("Title and message required!");

      const user = auth.currentUser;
      if (!user) return alert("You must be logged in!");

      database.ref(currentCategory + '/threads').push({
        title: title,
        content: content,
        author: user.displayName || user.email.split('@')[0],
        timestamp: Date.now()
      }).then(() => {
        document.getElementById("thread-title").value = '';
        document.getElementById("thread-content").value = '';
        alert("✅ Thread posted successfully!");
      });
    }

    function openThread(threadId) {
      currentThreadId = threadId;
      hideAllPages();
      document.getElementById("thread-view").style.display = "block";

      database.ref(currentCategory + '/threads/' + threadId).once('value', (snap) => {
        const thread = snap.val();
        if (!thread) return;

        document.getElementById("original-post").innerHTML = `
          ${getAvatarHtml()}
          <div style="margin-left:80px">
            <strong style="font-size:18px">${thread.title}</strong><br>
            by ${thread.author}<br><br>
            ${thread.content || ''}
          </div>`;
        loadReplies(threadId);
      });
    }

    function loadReplies(threadId) {
      database.ref(currentCategory + '/threads/' + threadId + '/replies').on('value', (snap) => {
        const replies = snap.val();
        let html = '';
        if (replies) {
          Object.keys(replies).forEach(key => {
            const r = replies[key];
            html += `
              <div class="post">
                ${getAvatarHtml()}
                <div style="margin-left:80px">
                  <strong>${r.author}</strong> • ${new Date(r.timestamp).toLocaleString()}<br><br>
                  ${r.content}
                </div>
              </div>`;
          });
        }
        document.getElementById("replies-list").innerHTML = html || '<p style="padding:20px;text-align:center;color:#666">No replies yet.</p>';
      });
    }

    function postReply() {
      const content = document.getElementById("reply-content").value.trim();
      if (!content) return alert("Write a reply!");

      const user = auth.currentUser;
      if (!user) return alert("You must be logged in!");

      database.ref(currentCategory + '/threads/' + currentThreadId + '/replies').push({
        content: content,
        author: user.displayName || user.email.split('@')[0],
        timestamp: Date.now()
      }).then(() => {
        document.getElementById("reply-content").value = '';
        alert("✅ Reply posted!");
      });
    }

    function backToList() {
      document.getElementById("thread-view").style.display = "none";
      document.getElementById("threads-list").style.display = "block";
    }

    function showAdminPanel() {
      if (!currentUser || currentUser.email !== OWNER_EMAIL) {
        alert("You are not the admin!");
        return;
      }
      hideAllPages();
      document.getElementById("admin-page").style.display = "block";
      document.getElementById("current-category").textContent = "Admin Dashboard";
    }

    function postAnnouncement() {
      alert("Announcement feature coming in next update.");
    }

    function logout() {
      auth.signOut().then(() => location.reload());
    }

    function signUp() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      if (!email || !password) return alert("Email and password required!");

      auth.createUserWithEmailAndPassword(email, password)
        .then(() => alert("Account created! Please login."))
        .catch(err => alert("Sign Up Error: " + err.message));
    }

    function login() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      auth.signInWithEmailAndPassword(email, password)
        .then((userCredential) => {
          currentUser = userCredential.user;
          document.getElementById("admin-link").style.display = (currentUser.email === OWNER_EMAIL) ? "inline" : "none";
          document.getElementById("logout-btn").style.display = "inline";
          document.getElementById("username-display").textContent = currentUser.email.split('@')[0];
          alert("✅ Logged in successfully!");
        })
        .catch(err => alert("Login Error: " + err.message));
    }

    auth.onAuthStateChanged((user) => {
      currentUser = user;
      const loggedIn = !!user;
      document.getElementById("auth-box").style.display = loggedIn ? "none" : "block";
      document.getElementById("new-thread-box").style.display = loggedIn ? "block" : "none";
      if (user) {
        document.getElementById("username-display").textContent = user.email.split('@')[0];
        document.getElementById("logout-btn").style.display = "inline";
      }
    });

    window.onload = () => {
      showCategory('general');
    };
  </script>
</body>
</html>
