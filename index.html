<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROBLOX Forum - Archive</title>
    <style>
        /* THE "OLD ROBLOX" AESTHETIC */
        body {
            font-family: Verdana, Arial, Helvetica, sans-serif;
            background-color: #E1E1E1;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #000;
            color: white;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .container {
            width: 900px;
            margin: 20px auto;
            background: white;
            border: 1px solid #999;
            padding: 15px;
        }

        .forum-header {
            background: #ccc;
            padding: 5px;
            font-weight: bold;
            border: 1px solid #666;
            margin-bottom: 10px;
        }

        .thread-row {
            border-bottom: 1px solid #ddd;
            padding: 10px;
            display: flex;
            justify-content: space-between;
        }

        .auth-box {
            border: 2px solid #0055ff;
            padding: 20px;
            background: #f0f5ff;
            margin-bottom: 20px;
        }

        button {
            background: #e1e1e1;
            border: 1px solid #777;
            cursor: pointer;
            padding: 5px 10px;
        }

        button:hover { background: #fff; }

        input, select { margin: 5px 0; display: block; }

        .hidden { display: none; }
    </style>
</head>
<body>

<header>
    <div style="font-size: 24px; font-weight: bold;">ROBLOX FORUM</div>
    <div id="user-status">Not Logged In</div>
</header>

<div class="container">
    <div id="auth-section" class="auth-box">
        <h3 id="form-title">Login / Sign Up</h3>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        
        <div id="signup-extras">
            <label>Gender:</label>
            <select id="gender">
                <option value="Boy">Boy</option>
                <option value="Girl">Girl</option>
            </select>
        </div>

        <button onclick="signUp()">Sign Up</button>
        <button onclick="login()">Login</button>
        <button onclick="logout()" class="hidden" id="logout-btn">Logout</button>
    </div>

    <div class="forum-header">General Help & Discussion</div>
    <div id="forum-threads">
        <div class="thread-row">
            <span>Welcome to the Old School Forum!</span>
            <span>By: Admin</span>
        </div>
        <div class="thread-row">
            <span>How do I change my character?</span>
            <span>By: Builderman</span>
        </div>
    </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  // PASTE YOUR FIREBASE CONFIG HERE
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_PROJECT.appspot.com",
    messagingSenderId: "YOUR_ID",
    appId: "YOUR_APP_ID"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // --- FUNCTIONS ---

  window.signUp = async () => {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const gender = document.getElementById('gender').value;

    try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;
        
        // Save Gender to Firestore
        await setDoc(doc(db, "users", user.uid), {
            email: email,
            gender: gender
        });
        alert("Account Created as " + gender);
    } catch (error) {
        alert(error.message);
    }
  };

  window.login = async () => {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    try {
        await signInWithEmailAndPassword(auth, email, password);
        alert("Logged In!");
    } catch (error) {
        alert(error.message);
    }
  };

  window.logout = () => {
    signOut(auth);
  };

  // Monitor Auth State
  onAuthStateChanged(auth, async (user) => {
    const status = document.getElementById('user-status');
    const logoutBtn = document.getElementById('logout-btn');
    if (user) {
        const userDoc = await getDoc(doc(db, "users", user.uid));
        const userData = userDoc.data();
        status.innerText = `Logged in as: ${user.email} (${userData?.gender || 'User'})`;
        logoutBtn.classList.remove('hidden');
    } else {
        status.innerText = "Not Logged In";
        logoutBtn.classList.add('hidden');
    }
  });
</script>

</body>
</html>
