<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Robloxians - 2012 Legacy</title>
    <style>
        body { font-family: "MS Sans Serif", Geneva, sans-serif; margin: 0; background-image: url('https://wallpapercave.com/wp/wp9084955.jpg'); background-attachment: fixed; background-size: cover; }
        header { background: #0055ff; color: white; padding: 8px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid #0033aa; }
        #announcement-container { background: #ff9800; border-bottom: 2px solid #cc7a00; color: #fff; padding: 12px; font-weight: bold; text-align: center; display: none; font-size: 14px; }
        .main-wrapper { width: 950px; margin: 20px auto; background: rgba(238, 238, 238, 0.95); border: 1px solid #888; min-height: 600px; padding: 20px; box-shadow: 0 0 20px rgba(0,0,0,0.4); }
        .auth-box { text-align: center; padding: 40px; }
        .auth-box input { display: block; margin: 10px auto; padding: 8px; width: 250px; border: 1px solid #777; }
        .forum-header { background: #ddd; color: #333; padding: 8px; font-weight: bold; border: 1px solid #bbb; }
        textarea#post-input { width: 100%; box-sizing: border-box; height: 100px; border: 1px solid #ccc; padding: 10px; font-size: 14px; margin-bottom: 10px; }
        .btn { background: #e1e1e1; border: 1px solid #777; padding: 5px 15px; cursor: pointer; font-size: 12px; font-weight: bold; }
        .btn-submit { background: #ffcc00; border-color: #ccaa00; }
        .btn-admin { background: #ffff00; color: #000; border: 1px solid #777; } 
        .btn-danger { background: #ff4444; color: white; border: 1px solid #aa0000; }
        .thread-row { border-bottom: 1px solid #ddd; padding: 12px; background: #fff; display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
        .hidden { display: none !important; }
        #admin-panel { border: 2px solid #0055ff; padding: 15px; margin-bottom: 15px; background: #fff; }
    </style>
</head>
<body>

<header>
    <div style="font-weight:bold; font-size: 18px;">ROBLOX - The Robloxians</div>
    <div id="user-display" style="font-size: 12px;">Guest</div>
</header>

<div id="announcement-container"><span id="announcement-display"></span></div>

<div class="main-wrapper">
    <div id="auth-view">
        <div class="auth-box">
            <h2 style="color:#0055ff;">Sign in to The Robloxians</h2>
            <input type="text" id="reg-user" placeholder="Username (New accounts only)">
            <input type="email" id="auth-email" placeholder="Email Address">
            <input type="password" id="auth-pass" placeholder="Password">
            <div style="margin-top:15px;">
                <button class="btn" id="loginBtn">Login</button>
                <button class="btn btn-submit" id="signupBtn">Create Account</button>
            </div>
        </div>
    </div>

    <div id="logged-in-view" class="hidden">
        <div style="display: flex; justify-content: space-between; margin-bottom: 15px; align-items: center;">
            <span id="welcome-text" style="font-weight: bold; font-size: 18px;"></span>
            <div>
                <button class="btn btn-admin hidden" id="adminBtn">Admin Dashboard</button>
                <button class="btn btn-danger" id="logoutBtn">Logout</button>
            </div>
        </div>

        <div id="admin-panel" class="hidden">
            <strong>Admin Dashboard</strong><br><br>
            Banner: <input type="text" id="announce-text" placeholder="Global message..." style="width:60%;">
            <button class="btn btn-submit" id="postAnnounce">Save Banner</button>
            <hr>
            User UID: <input type="text" id="target-uid" placeholder="Paste UID here...">
            <button class="btn" id="applyBan" style="color:red;">Ban User</button>
            <button class="btn" id="applyUnban">Unban User</button>
        </div>

        <div class="forum-header">Community Feed</div>
        <textarea id="post-input" placeholder="What's on your mind?"></textarea><br>
        <button class="btn btn-submit" id="submitPost">Submit Post</button>
        <div id="thread-display" style="margin-top: 15px;"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, set, push, onValue, get, child, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyANfmR8j_Z7mHmSO1GNXGnIGKTdBiU6uiU",
        authDomain: "testingforum-669a9.firebaseapp.com",
        databaseURL: "https://testingforum-669a9-default-rtdb.firebaseio.com",
        projectId: "testingforum-669a9",
        storageBucket: "testingforum-669a9.firebasestorage.app",
        messagingSenderId: "685025117821",
        appId: "1:685025117821:web:c3340c8d5475e33eded314"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const OWNER_EMAIL = "fahid.001x@gmail.com";

    // AUTH ACTIONS
    document.getElementById('signupBtn').onclick = () => {
        const email = document.getElementById('auth-email').value;
        const pass = document.getElementById('auth-pass').value;
        const user = document.getElementById('reg-user').value;
        if(!user) return alert("Enter a username!");
        createUserWithEmailAndPassword(auth, email, pass).then((res) => {
            set(ref(db, `users/${res.user.uid}`), { username: user, email: email, rank: "member", banned: false });
        }).catch(err => alert(err.message));
    };

    document.getElementById('loginBtn').onclick = () => {
        signInWithEmailAndPassword(auth, document.getElementById('auth-email').value, document.getElementById('auth-pass').value).catch(err => alert(err.message));
    };

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            // Ban Watcher
            onValue(ref(db, `users/${user.uid}/banned`), (snapshot) => {
                if (snapshot.val() === true) { 
                    alert("Account Banned."); 
                    signOut(auth).then(() => location.reload()); 
                }
            });

            // Show Forum, Hide Login
            document.getElementById('auth-view').classList.add('hidden');
            document.getElementById('logged-in-view').classList.remove('hidden');
            
            const snap = await get(child(ref(db), `users/${user.uid}`));
            const userData = snap.val() || {};
            document.getElementById('welcome-text').innerText = "Hello, " + (userData.username || "User") + "!";
            
            if(user.email.toLowerCase() === OWNER_EMAIL || userData.rank === "admin") {
                document.getElementById('adminBtn').classList.remove('hidden');
            }

            // Banner Logic
            onValue(ref(db, 'announcement/text'), (snapshot) => {
                if(snapshot.exists() && snapshot.val() !== "") {
                    document.getElementById('announcement-display').innerText = snapshot.val();
                    document.getElementById('announcement-container').style.display = 'block';
                } else {
                    document.getElementById('announcement-container').style.display = 'none';
                }
            });

            // Load Chat
            onValue(ref(db, 'threads'), (snapshot) => {
                const displayArea = document.getElementById('thread-display');
                displayArea.innerHTML = "";
                snapshot.forEach(child => {
                    const post = child.val();
                    const row = document.createElement('div');
                    row.className = 'thread-row';
                    row.innerHTML = `<div><strong>${post.author}</strong>: ${post.message}</div>`;
                    displayArea.prepend(row);
                });
            });
        } else {
            // LOGGED OUT STATE: Show login, hide everything else
            document.getElementById('auth-view').classList.remove('hidden');
            document.getElementById('logged-in-view').classList.add('hidden');
            document.getElementById('user-display').innerText = "Guest";
        }
    });

    // POSTING
    document.getElementById('submitPost').onclick = async () => {
        const msg = document.getElementById('post-input').value;
        if(!msg) return;
        const snap = await get(child(ref(db), `users/${auth.currentUser.uid}`));
        push(ref(db, 'threads'), { message: msg, author: snap.val().username, uid: auth.currentUser.uid });
        document.getElementById('post-input').value = "";
    };

    // ADMIN TOOLS
    document.getElementById('postAnnounce').onclick = () => set(ref(db, 'announcement/text'), document.getElementById('announce-text').value);
    
    document.getElementById('applyUnban').onclick = () => {
        const uid = document.getElementById('target-uid').value.trim();
        if(uid) update(ref(db, `users/${uid}`), { banned: false }).then(() => alert("Unbanned!"));
    };

    document.getElementById('applyBan').onclick = () => {
        const uid = document.getElementById('target-uid').value.trim();
        if(uid) update(ref(db, `users/${uid}`), { banned: true }).then(() => alert("Banned!"));
    };

    document.getElementById('adminBtn').onclick = () => document.getElementById('admin-panel').classList.toggle('hidden');
    document.getElementById('logoutBtn').onclick = () => signOut(auth).then(() => location.reload());
</script>

</body>
</html>
