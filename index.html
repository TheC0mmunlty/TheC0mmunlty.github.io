<!DOCTYPE html>
<html>
<head>
<title>Stable Forum System</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#dfe5ec;
}

.topbar {
  background:#3b4f6b;
  color:white;
  padding:10px;
  display:flex;
  align-items:center;
  gap:10px;
}

.logo {
  height:30px;
  cursor:pointer;
}

.container {
  width:850px;
  margin:20px auto;
}

.box {
  background:white;
  border:1px solid #bbb;
  padding:10px;
  margin-bottom:10px;
}

.post {
  background:white;
  border:1px solid #bbb;
  padding:10px;
  margin-top:10px;
}

/* CHAT */
#chatBox {
  position:fixed;
  right:10px;
  bottom:10px;
  width:300px;
  height:350px;
  background:white;
  border:2px solid #333;
  display:flex;
  flex-direction:column;
}

#messages {
  flex:1;
  overflow:auto;
  padding:5px;
}

.msg {
  margin:3px;
  padding:4px;
  background:#f1f1f1;
}

input, textarea {
  width:100%;
  padding:5px;
}
</style>
</head>

<body>

<div class="topbar">
<img class="logo"
src="https://cdn.discordapp.com/attachments/1495473511836291142/1497459975067275389/Logo.png">

<span>Stable Forum</span>
</div>

<div class="container">

<!-- POSTS -->
<div class="box">
<h3>Create Post</h3>
<textarea id="postInput"></textarea>
<button onclick="createPost()">Post</button>
</div>

<div id="postList"></div>

</div>

<!-- CHAT -->
<div id="chatBox">

<div style="background:#3b4f6b;color:white;padding:5px;">
Chat
</div>

<div id="messages"></div>

<input id="chatInput" placeholder="Message...">
<button onclick="sendMsg()">Send</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  query,
  orderBy,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyANfmR8j_Z7mHmSO1GNXGnIGKTdBiU6uiU",
  authDomain: "testingforum-669a9.firebaseapp.com",
  projectId: "testingforum-669a9",
  storageBucket: "testingforum-669a9.firebasestorage.app",
  messagingSenderId: "685025117821",
  appId: "1:685025117821:web:12f3c1bca79906a3ded314"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* SAFE GLOBALS */
window.currentUser = "Player";
window.currentChat = "global";

/* ======================
   POSTS (FIXED)
====================== */

window.createPost = async function () {

  const input = document.getElementById("postInput");

  if (!input.value.trim()) return;

  await addDoc(collection(db,"posts"),{
    text: input.value,
    user: window.currentUser,
    time: Date.now()
  });

  input.value = "";
  loadPosts();
};

async function loadPosts() {

  const q = query(collection(db,"posts"), orderBy("time","desc"));
  const snap = await getDocs(q);

  const list = document.getElementById("postList");
  list.innerHTML = "";

  snap.forEach(d => {
    const p = d.data();

    const div = document.createElement("div");
    div.className = "post";

    div.innerHTML = `<b>${p.user}</b><br>${p.text}`;

    list.appendChild(div);
  });
}

loadPosts();

/* ======================
   CHAT (FIXED)
====================== */

window.sendMsg = async function () {

  const input = document.getElementById("chatInput");

  if (!input.value.trim()) return;

  await addDoc(collection(db,"messages"),{
    room: "global",
    from: window.currentUser,
    text: input.value,
    time: Date.now()
  });

  input.value = "";
};

function loadChat() {

  const q = query(collection(db,"messages"), orderBy("time"));

  onSnapshot(q, snap => {

    const box = document.getElementById("messages");
    box.innerHTML = "";

    snap.forEach(d => {
      const m = d.data();

      if (m.room === "global") {
        const div = document.createElement("div");
        div.className = "msg";

        div.innerHTML = `<b>${m.from}</b>: ${m.text}`;

        box.appendChild(div);
      }
    });

    box.scrollTop = box.scrollHeight;
  });
}

loadChat();

</script>

</body>
</html>
