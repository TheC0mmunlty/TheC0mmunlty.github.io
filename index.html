<!DOCTYPE html>
<html>
<head>
<title>Social Forum Final System</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#dfe5ec;
}

.topbar {
  background:#3b4f6b;
  color:white;
  padding:10px;
  display:flex;
  align-items:center;
  gap:10px;
}

.logo {
  height:30px;
  cursor:pointer;
}

/* ONLINE DOT */
.onlineDot {
  width:10px;
  height:10px;
  border-radius:50%;
  background:gray;
  display:inline-block;
}

.online {
  background:#00ff4c;
  box-shadow:0 0 6px #00ff4c;
}

/* CONTAINER */
.container {
  width:850px;
  margin:20px auto;
}

.box {
  background:white;
  border:1px solid #bbb;
  padding:10px;
  margin-bottom:10px;
}

/* FRIEND / CLAN LIST */
.item {
  padding:5px;
  border-bottom:1px solid #ddd;
  cursor:pointer;
}

.item:hover {
  background:#eee;
}

/* PROFILE PAGE */
#profilePage {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#dfe5ec;
  padding:20px;
}

#profileCard {
  width:400px;
  background:white;
  padding:15px;
  border:2px solid #333;
}

button { margin-top:5px; }
</style>
</head>

<body>

<div class="topbar">
<img class="logo" src="https://cdn.discordapp.com/attachments/1495473511836291142/1497459975067275389/Logo.png"
onclick="location.reload()">

Social Network
</div>

<div class="container">

<!-- FRIENDS -->
<div class="box">
<h3>👥 Friends</h3>
<div id="friends"></div>
</div>

<!-- CLANS -->
<div class="box">
<h3>⚔ Clans</h3>
<input id="clanName" placeholder="Create clan name">
<button onclick="createClan()">Create Clan</button>
<div id="clanList"></div>
</div>

<!-- GROUPS -->
<div class="box">
<h3>💬 Friend Groups</h3>
<div id="groups"></div>
</div>

</div>

<!-- PROFILE PAGE -->
<div id="profilePage">
  <div id="profileCard">
    <h2 id="pName"></h2>

    <span class="onlineDot" id="pStatus"></span>
    <p id="pEmail"></p>

    <button onclick="closeProfile()">Close</button>
  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  setDoc,
  doc,
  getDoc
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

import {
  getAuth,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyANfmR8j_Z7mHmSO1GNXGnIGKTdBiU6uiU",
  authDomain: "testingforum-669a9.firebaseapp.com",
  projectId: "testingforum-669a9",
  storageBucket: "testingforum-669a9.firebasestorage.app",
  messagingSenderId: "685025117821",
  appId: "1:685025117821:web:12f3c1bca79906a3ded314"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let currentUser = null;

/* ONLINE STATUS */
onAuthStateChanged(auth, async user=>{
  if(!user) return;

  currentUser = user;

  await setDoc(doc(db,"users",user.uid),{
    email:user.email,
    online:true
  },{merge:true});

  loadFriends();
  loadClans();
});

/* FRIEND LIST */
async function loadFriends(){
  let snap = await getDocs(collection(db,"friends"));

  friends.innerHTML="";

  snap.forEach(d=>{
    let f=d.data();

    if(f.status==="accepted" &&
      (f.from===currentUser.email || f.to===currentUser.email)){

      let friend = f.from===currentUser.email ? f.to : f.from;

      let div=document.createElement("div");
      div.className="item";

      div.innerHTML = `
        <span class="onlineDot online"></span>
        ${friend}
      `;

      div.onclick=()=>openProfile(friend);

      friends.appendChild(div);
    }
  });
}

/* CLANS */
window.createClan = async function(){
  await addDoc(collection(db,"clans"),{
    name:clanName.value,
    owner:currentUser.email,
    members:[currentUser.email]
  });

  loadClans();
};

async function loadClans(){
  let snap = await getDocs(collection(db,"clans"));

  clanList.innerHTML="";

  snap.forEach(d=>{
    let c=d.data();

    let div=document.createElement("div");
    div.className="item";

    div.innerHTML=`
      ⚔ ${c.name} (Owner: ${c.owner})
    `;

    div.onclick=async()=>{
      await addDoc(collection(db,"clanJoinRequests"),{
        clan:c.name,
        user:currentUser.email,
        status:"pending"
      });

      alert("Join request sent");
    };

    clanList.appendChild(div);
  });
}

/* FRIEND GROUPS */
async function loadGroups(){
  let snap = await getDocs(collection(db,"friends"));

  groups.innerHTML="";

  let myFriends=[];

  snap.forEach(d=>{
    let f=d.data();
    if(f.status==="accepted"){
      if(f.from===currentUser.email) myFriends.push(f.to);
      if(f.to===currentUser.email) myFriends.push(f.from);
    }
  });

  let div=document.createElement("div");
  div.className="item";
  div.innerText="Group Chat ("+myFriends.length+" members)";
  groups.appendChild(div);
}

/* PROFILE PAGE */
window.openProfile = async function(email){
  profilePage.style.display="block";

  pName.innerText=email;
  pEmail.innerText=email;

  pStatus.classList.add("online");
};

window.closeProfile = function(){
  profilePage.style.display="none";
};

/* LOOP */
setInterval(()=>{
  if(currentUser){
    loadFriends();
    loadClans();
    loadGroups();
  }
},4000);

</script>

</body>
</html>
