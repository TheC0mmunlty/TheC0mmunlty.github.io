<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Robloxians Forum</title>
    <style>
        body { 
            font-family: Verdana, sans-serif; margin: 0; background-color: #000; 
            background-image: url('https://wallpapercave.com/wp/wp9084955.jpg'); 
            background-attachment: fixed; background-size: cover; background-position: center; 
        }
        header { background: #000; color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #555; }
        
        #announcement-container { background-color: #ff9800; border-bottom: 2px solid #b36b00; width: 100%; padding: 6px 0; text-align: center; display: none; }
        .announcement-text { font-family: 'Arial Black', sans-serif; font-size: 14px; color: #fff; text-transform: uppercase; }

        .main-wrapper { width: 900px; margin: 20px auto; background: #fff; border: 1px solid #888; min-height: 800px; box-shadow: 0px 0px 20px rgba(0,0,0,0.5); }
        
        .forum-header { background: #ccc; padding: 8px; font-weight: bold; margin-top: 15px; font-size: 13px; border: 1px solid #999; }
        .thread-row { border-bottom: 1px solid #eee; padding: 12px; display: flex; justify-content: space-between; font-size: 13px; background: #fff; align-items: flex-start; }
        .clickable-name { cursor: pointer; text-decoration: underline; font-weight: bold; }
        
        .btn { background: #e1e1e1; border: 1px solid #777; padding: 6px 14px; cursor: pointer; font-size: 12px; border-radius: 4px; }
        .btn-admin { background: #ffcc00; font-weight: bold; }
        .btn-danger { background: #ff4444; color: white; border: 1px solid #900; }
        
        .hidden { display: none !important; }

        /* Admin Log Area */
        #admin-logs { height: 150px; overflow-y: auto; background: #111; color: #0f0; border: 1px solid #555; font-size: 11px; padding: 8px; margin-top: 10px; font-family: 'Courier New', monospace; }

        #profile-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; z-index: 100; justify-content: center; align-items: center; }
        .profile-card { background: white; padding: 20px; border: 2px solid #555; width: 350px; text-align: center; border-radius: 8px; }
        .bio-box { background: #f4f4f4; border: 1px solid #ddd; padding: 10px; margin: 10px 0; font-size: 12px; text-align: left; min-height: 50px; }
    </style>
</head>
<body>

<div id="announcement-container"><div class="announcement-text" id="announcement-display"></div></div>

<header>
    <div style="font-weight:bold; font-size: 18px;">THE ROBLOXIANS FORUM</div>
    <div id="user-display" style="font-size: 11px; color: #ccc;">Guest</div>
</header>

<div class="main-wrapper">
    <div id="logged-out-view" class="hidden" style="min-height: 800px; display: flex; align-items: center; justify-content: center; background-image: url('https://cdn.discordapp.com/attachments/1395984013587386390/1497797311466569758/login_sign_up.png?ex=69eed3f2&is=69ed8272&hm=5763e511b207221de6dde3aa5ec39e6d79a9fc946c7e120fd94a3119fa121bc5'); background-size: cover;">
        <div style="width: 380px; border: 4px solid #0055ff; background: rgba(255, 255, 255, 0.95); padding: 25px; text-align: center; border-radius: 15px;">
            <h2>The Robloxians</h2>
            <input type="text" id="reg-username" placeholder="Username">
            <input type="email" id="auth-email" placeholder="Email">
            <input type="password" id="auth-password" placeholder="Password">
            <div style="margin-top:15px;"><button class="btn" id="loginBtn">Login</button> <button class="btn btn-admin" id="signupBtn">Sign Up</button></div>
        </div>
    </div>

    <div id="logged-in-view" class="hidden">
        <div style="background: #e1e1e1; padding: 8px; border-bottom: 1px solid #ccc; display: flex; justify-content: space-between;">
            <span id="welcome-text" style="font-size: 11px; font-weight: bold;">Loading...</span>
            <div>
                <button class="btn btn-admin hidden" id="adminBtn">Staff Panel</button>
                <button class="btn btn-danger" id="logoutBtn">Logout</button>
            </div>
        </div>

        <div id="admin-panel" class="hidden" style="border: 2px dashed orange; padding: 15px; margin: 15px; background: #fffdf0;">
            <strong>Staff Controls & Shadow Logs</strong><br>
            <input type="text" id="target-uid" placeholder="User UID" style="width: 250px;">
            <button class="btn btn-danger" id="applyBan">Ban</button>
            <button class="btn btn-admin" id="applyUnban">Unban</button>
            <hr>
            <strong>Shadow Chatlog (Spam Catching):</strong>
            <div id="admin-logs"></div>
        </div>

        <div style="padding: 15px;">
            <div class="forum-header">Community Feed</div>
            <textarea id="post-input" placeholder="What's on your mind?" style="height: 60px;"></textarea>
            <button class="btn btn-admin" id="submitPost" style="margin-top:8px;">Submit Post</button>
            <div id="thread-display" style="margin-top: 20px;"></div>
        </div>
    </div>
</div>

<div id="profile-overlay">
    <div class="profile-card">
        <h2 id="p-name">Profile</h2>
        <div id="p-bio" class="bio-box"></div>
        <div id="decoration-options" class="hidden">
            <label style="font-size: 10px;">Pick Theme Color:</label>
            <input type="color" id="theme-picker" value="#0055ff">
            <button class="btn" id="save-theme-btn">Save</button>
        </div>
        <button id="edit-bio-btn" class="btn hidden">Edit Bio</button>
        <div id="p-uid-display" style="font-size: 9px; color: #999; margin-top: 10px;"></div>
        <hr>
        <button class="btn" onclick="document.getElementById('profile-overlay').style.display='none'">Close</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, set, push, onValue, get, child, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyANfmR8j_Z7mHmSO1GNXGnIGKTdBiU6uiU",
        authDomain: "testingforum-669a9.firebaseapp.com",
        databaseURL: "https://testingforum-669a9-default-rtdb.firebaseio.com",
        projectId: "testingforum-669a9",
        storageBucket: "testingforum-669a9.firebasestorage.app",
        messagingSenderId: "685025117821",
        appId: "1:685025117821:web:c3340c8d5475e33eded314"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const OWNER_EMAIL = "fahid.001x@gmail.com";
    let isStaff = false;

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const banSnap = await get(child(ref(db), `bans/${user.uid}`));
            if(banSnap.exists()){
                document.body.innerHTML = `<div style="background:black; color:white; height:100vh; display:flex; align-items:center; justify-content:center; font-family:Impact;"><h1>BANNED: ${banSnap.val().reason}</h1></div>`;
                return;
            }
            document.getElementById('logged-in-view').classList.remove('hidden');
            document.getElementById('logged-out-view').classList.add('hidden');
            
            const snap = await get(child(ref(db), `users/${user.uid}`));
            const userData = snap.val();
            document.getElementById('welcome-text').innerText = "Logged in: " + (userData ? userData.username : "User");
            
            if(user.email.toLowerCase() === OWNER_EMAIL || (userData && userData.rank === "admin")) {
                isStaff = true;
                document.getElementById('adminBtn').classList.remove('hidden');
                loadShadowLogs();
            }
            loadThreads();
        } else {
            document.getElementById('logged-out-view').classList.remove('hidden');
            document.getElementById('logged-in-view').classList.add('hidden');
        }
    });

    // BUG FIX: Clearing the UI before re-drawing threads prevents old messages from "ghosting"
    function loadThreads() {
        onValue(ref(db, 'threads'), async (s) => {
            const d = document.getElementById('thread-display');
            d.innerHTML = ""; 
            if (!s.exists()) return;

            let threads = [];
            s.forEach(c => { threads.push({id: c.key, ...c.val()}); });
            threads.reverse(); // Newest first

            for (let p of threads) {
                const uSnap = await get(child(ref(db), `users/${p.uid}`));
                const uD = uSnap.val();
                const color = (uD && uD.themeColor) ? uD.themeColor : "#0055ff";
                
                const row = document.createElement('div');
                row.className = 'thread-row';
                row.innerHTML = `
                    <div style="flex-grow: 1;">
                        <span class="clickable-name" style="color:${color}" onclick="openProfile('${p.uid}')">${p.author}</span>: ${p.message}
                    </div>
                    ${isStaff ? `<button class="btn-danger" style="padding:2px 5px; font-size:10px;" onclick="deletePost('${p.id}', '${p.author}', '${p.message}')">DEL</button>` : ""}
                `;
                d.appendChild(row);
            }
        });
    }

    function loadShadowLogs() {
        onValue(ref(db, 'shadow_logs'), (s) => {
            const logBox = document.getElementById('admin-logs');
            logBox.innerHTML = "--- SHADOW LOGS (DELETION TRACKER) ---<br>";
            s.forEach(c => {
                logBox.innerHTML += `[${c.val().time}] ${c.val().msg}<br>`;
            });
            logBox.scrollTop = logBox.scrollHeight;
        });
    }

    window.deletePost = (pid, author, msg) => {
        if(confirm("Delete this post?")) {
            push(ref(db, 'shadow_logs'), { 
                time: new Date().toLocaleTimeString(), 
                msg: `ADMIN DELETED: ${author} - "${msg}"` 
            });
            remove(ref(db, `threads/${pid}`));
        }
    };

    window.openProfile = async (uid) => {
        const snap = await get(child(ref(db), `users/${uid}`));
        if(snap.exists()) {
            const d = snap.val();
            document.getElementById('p-name').innerText = d.username;
            document.getElementById('p-bio').innerText = d.bio || "No bio set.";
            document.getElementById('p-uid-display').innerText = "UID: " + uid;
            document.getElementById('profile-overlay').style.display = 'flex';
            if(isStaff) document.getElementById('target-uid').value = uid;

            if(uid === auth.currentUser.uid) {
                document.getElementById('edit-bio-btn').classList.remove('hidden');
                document.getElementById('decoration-options').classList.remove('hidden');
                document.getElementById('save-theme-btn').onclick = () => {
                    update(ref(db, `users/${uid}`), { themeColor: document.getElementById('theme-picker').value }).then(() => alert("Saved!"));
                };
            } else {
                document.getElementById('edit-bio-btn').classList.add('hidden');
                document.getElementById('decoration-options').classList.add('hidden');
            }
        }
    };

    document.getElementById('submitPost').onclick = async () => {
        const input = document.getElementById('post-input');
        const m = input.value.trim();
        if(!m) return;

        const snap = await get(child(ref(db), `users/${auth.currentUser.uid}`));
        const username = snap.val() ? snap.val().username : "Unknown";

        push(ref(db, 'threads'), { 
            message: m, 
            author: username, 
            uid: auth.currentUser.uid,
            timestamp: Date.now() 
        });
        input.value = "";
    };

    document.getElementById('applyBan').onclick = () => {
        const uid = document.getElementById('target-uid').value;
        const reason = prompt("Reason?");
        if(uid && reason) set(ref(db, `bans/${uid}`), { reason });
    };

    document.getElementById('adminBtn').onclick = () => document.getElementById('admin-panel').classList.toggle('hidden');
    document.getElementById('logoutBtn').onclick = () => signOut(auth).then(() => location.reload());
    document.getElementById('loginBtn').onclick = () => signInWithEmailAndPassword(auth, document.getElementById('auth-email').value, document.getElementById('auth-password').value);
    document.getElementById('signupBtn').onclick = async () => {
        const u = document.getElementById('reg-username').value;
        const e = document.getElementById('auth-email').value;
        const p = document.getElementById('auth-password').value;
        const res = await createUserWithEmailAndPassword(auth, e, p);
        await set(ref(db, 'users/' + res.user.uid), { username: u, email: e, rank: "member", bio: "", themeColor: "#0055ff" });
        location.reload();
    };
</script>
</body>
</html>
